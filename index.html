<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>freezer-1.3</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #1890ff;
      --danger: #ff4d4f;
      --warning: #faad14;
      --bg: #f5f7fa;
      --dark: #001529;
      --card: #fff;
      --muted: #8c8c8c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
    }
    .sidebar {
      width: 300px;
      background: var(--dark);
      color: #fff;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }
    .logo { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .section-title { font-size: 12px; opacity: .8; margin: 6px 0 2px; }
    .list { background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06); border-radius: 8px; padding: 8px; overflow: auto; }
    .folder-list { max-height: 132px; }
    .box-list {
      flex: 1;
      min-height: 180px;
      padding: 10px;
      background: linear-gradient(180deg, rgba(2,22,44,.65), rgba(2,22,44,.2));
      border: 1px solid rgba(73,132,179,.26);
    }
    .folder-list .item {
      padding: 6px 8px;
      margin-bottom: 5px;
      font-size: 12px;
    }
    .folder-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 2px 10px;
      scrollbar-width: thin;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.08);
    }
    .folder-chip {
      flex: 0 0 auto;
      border: 1px solid rgba(120,195,255,.3);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #d0e9ff;
      cursor: pointer;
      white-space: nowrap;
      background: rgba(17,42,69,.9);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      transition: all .2s ease;
    }
    .folder-chip:hover {
      transform: translateY(-1px);
      border-color: rgba(140,215,255,.8);
      box-shadow: 0 2px 8px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.12);
    }
    .folder-chip.active {
      color: #fff;
      border-color: currentColor;
      background: linear-gradient(135deg, rgba(24,144,255,.55), rgba(19,194,194,.3));
      box-shadow: 0 0 0 1px rgba(255,255,255,.12) inset, 0 4px 12px rgba(24,144,255,.25);
    }
    .folder-chip.all.active { color: #8fd3ff; }
    .box-group-title {
      font-size: 12px;
      margin: 8px 0 6px;
      padding: 5px 8px;
      border-radius: 6px;
      color: #fff;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }
    .item {
      padding: 8px 10px;
      border-radius: 6px;
      background: #112a45;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      border: 1px solid transparent;
      font-size: 13px;
      gap: 8px;
    }
    .item:hover { border-color: #6f6f6f; }
    .item.active { background: var(--primary); border-color: #69c0ff; }
    .item.folder-item, .item.box-item { border-left: 4px solid transparent; }
    .item.box-item {
      border-left-width: 6px;
      background: linear-gradient(145deg, rgba(22,59,94,.92), rgba(10,35,61,.92));
      border-color: rgba(114,190,255,.22);
      box-shadow: 0 2px 10px rgba(0,0,0,.18);
      padding: 10px 10px;
    }
    .item.box-item:hover {
      border-color: rgba(151,216,255,.6);
      transform: translateY(-1px);
    }
    .item.box-item .item-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
      min-width: 0;
      white-space: normal;
    }
    .box-name {
      font-size: 13px;
      font-weight: 700;
      color: #f0f8ff;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .box-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 10px;
    }
    .box-meta-badge {
      border: 1px solid rgba(174,228,255,.35);
      border-radius: 999px;
      padding: 1px 6px;
      color: #d7f1ff;
      background: rgba(255,255,255,.08);
    }
    .item.box-item .mini-btn {
      border: 1px solid rgba(174,228,255,.25);
      border-radius: 6px;
      padding: 3px 6px;
      background: rgba(255,255,255,.06);
      color: #cfeeff;
    }
    .item-info { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .item-tag {
      font-size: 10px;
      opacity: .9;
      margin-left: 5px;
      display: inline-block;
      padding: 1px 6px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.24);
      background: rgba(255,255,255,.12);
    }
    .mini-btn {
      border: none;
      background: transparent;
      color: #bfbfbf;
      cursor: pointer;
      font-size: 12px;
      padding: 3px 5px;
      border-radius: 4px;
    }
    .mini-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
    .mini-btn.danger:hover { background: var(--danger); }
    .row { display: flex; gap: 8px; }
    .btn {
      border: 1px solid #d9d9d9;
      background: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn:hover { border-color: var(--primary); color: var(--primary); }
    .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn.primary:hover { filter: brightness(1.06); }
    .select-dark {
      width: 100%;
      border: 1px solid #1f3f63;
      border-radius: 6px;
      padding: 8px;
      background: #112a45;
      color: #fff;
      margin-bottom: 8px;
    }


    .sidebar {
      width: 340px;
      background: #0b1220;
      color: #fff;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
      border-right: 1px solid rgba(255,255,255,.06);
    }
    .sidebar-panel {
      border: 1px solid rgba(169,199,255,.35);
      border-radius: 10px;
      padding: 10px;
      background: rgba(7, 20, 38, .9);
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    .sidebar-head { font-size: 26px; font-weight: 700; margin-bottom: 2px; }
    .sidebar-title { font-size: 26px; font-weight: 700; margin-bottom: 2px; }
    .sidebar-sub { font-size: 13px; font-weight: 700; }
    .sidebar-search {
      width: 100%;
      border: 1px solid rgba(162,201,255,.35);
      border-radius: 8px;
      padding: 8px 10px;
      background: #0f2036;
      color: #e8f4ff;
    }
    .sidebar-search::placeholder { color: #8ab7e1; }
    .side-actions, .side-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .side-btn {
      border: 1px solid rgba(162,201,255,.35);
      border-radius: 8px;
      background: #132742;
      color: #fff;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .side-btn:hover { border-color: #69c0ff; }
    .side-filter {
      border-radius: 999px;
      border: 1px solid rgba(162,201,255,.35);
      background: #132742;
      color: #cde9ff;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .side-filter.active {
      color: #fff;
      border-color: #69c0ff;
      background: rgba(24,144,255,.45);
    }
    .folder-list { max-height: 280px; }
    .box-list { min-height: 180px; max-height: 280px; }
    .item.tree-item { background: rgba(17,42,69,.85); }
    .tree-arrow { font-size: 11px; color: #9fd1ff; margin-right: 6px; }

    .main { flex: 1; display: flex; flex-direction: column; gap: 16px; padding: 16px; overflow: hidden; }
    .header { display: flex; flex-direction: column; gap: 10px; align-items: stretch; }
    .header .row { flex-wrap: wrap; }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }
    .header-top-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .search-wrap.compact {
      flex: 0 1 420px;
      max-width: 420px;
      min-width: 300px;
    }
    .toolbar-card {
      border: 1px solid #e6e6e6;
      border-radius: 10px;
      background: #fff;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toolbar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .toolbar-title {
      font-size: 12px;
      color: #777;
      font-weight: 600;
    }
    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
    }
    .backup-actions {
      align-items: flex-start;
      flex-wrap: nowrap;
      justify-content: flex-start;
      gap: 12px;
    }
    .backup-btns {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .backup-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 8px;
      min-width: 320px;
    }
    .meta-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border: 1px solid transparent;
    }
    .meta-pill.dir {
      color: #0958d9;
      background: #e6f4ff;
      border-color: #91caff;
    }
    .meta-pill.state {
      color: #135200;
      background: #f6ffed;
      border-color: #b7eb8f;
    }
    .meta-pill.state.local {
      color: #ad6800;
      background: #fff7e6;
      border-color: #ffd591;
    }
    .meta-pill.state.off {
      color: #a8071a;
      background: #fff1f0;
      border-color: #ffa39e;
    }
    .btn.compact {
      padding: 7px 10px;
      font-size: 12px;
      border-radius: 7px;
    }
    .toolbar-collapsed-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    @media (max-width: 1080px) {
      .backup-actions {
        flex-wrap: wrap;
      }
      .backup-meta {
        min-width: 100%;
      }
    }
    .search-wrap { flex: 1; position: relative; }
    .search { width: 100%; padding: 12px; border: 1px solid #d9d9d9; border-radius: 8px; }
    .search:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(24,144,255,.2); }
    .search-dd {
      position: absolute;
      left: 0; right: 0; top: calc(100% + 6px);
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,.15);
      max-height: 360px;
      overflow: auto;
      display: none;
      z-index: 10;
    }
    .search-item {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
    }
    .search-item:hover { background: #f0f7ff; }
    .loc-tag { font-size: 11px; background: #f5f5f5; border-radius: 4px; color: #666; padding: 2px 6px; }


    .tool-sketch {
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 10px;
      background: #0e1117;
      color: #fff;
      padding: 10px 12px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }
    .tool-row {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.16);
    }
    .tool-row:last-child { border-bottom: none; }
    .tool-label { font-weight: 700; color: #f4f7ff; }
    .tool-search {
      width: min(640px, 100%);
      border: 1px solid rgba(164,205,255,.5);
      border-radius: 8px;
      background: #111b2b;
      color: #fff;
      padding: 9px 11px;
      font-size: 14px;
    }
    .tool-search::placeholder { color: #9dc3ef; }
    .tool-link-btn {
      border: 1px solid rgba(164,205,255,.45);
      border-radius: 7px;
      background: transparent;
      color: #fff;
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    .tool-link-btn:hover { border-color: #69c0ff; color: #69c0ff; }
    .tool-select {
      border: 1px solid rgba(164,205,255,.45);
      border-radius: 7px;
      background: #121d2f;
      color: #fff;
      padding: 5px 8px;
      font-size: 13px;
    }
    .tool-status { color: #ffd666; font-weight: 700; }
    .tool-status.ok { color: #95de64; }
    .tool-mini-log { color: #d6e8ff; font-size: 13px; }
    .toolbar-toggle-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }
    .toolbar-toggle-btn {
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 8px;
      background: #0e1117;
      color: #fff;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    .toolbar-toggle-btn:hover {
      border-color: #69c0ff;
      color: #69c0ff;
    }

    .content { flex: 1; display: flex; gap: 16px; overflow: hidden; }
    .view, .card { background: var(--card); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .view { flex: 1; padding: 16px; display: flex; justify-content: center; align-items: flex-start; overflow: auto; }
    .grid { display: grid; gap: 6px; width: fit-content; margin: 0 auto; }
    .empty-tip { color: #999; margin-top: 40px; }

    .cell {
      width: 48px; height: 48px;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      font-size: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      cursor: pointer;
      transition: .2s;
    }
    .cell.occupied { border-color: transparent; font-weight: 600; color: #333; }
    .cell.occupied:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.12); cursor: grab; }
    .cell.occupied:active { cursor: grabbing; }
    .cell.selected { border: 2px solid var(--primary) !important; box-shadow: 0 0 0 3px rgba(24,144,255,.22); transform: scale(1.05); }
    .cell.drag-over { border: 2px dashed var(--primary); background: #e6f7ff !important; }
    .cell.highlight { animation: pulse 1s infinite alternate; border: 2px solid var(--warning) !important; }
    .cell-label {
      max-width: 44px;
      padding: 1px 4px;
      border-radius: 4px;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(0,0,0,.08);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 11px;
      line-height: 1.2;
      text-align: center;
    }
    .cell-sub {
      margin-top: 2px;
      max-width: 40px;
      padding: 0 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.6);
      font-size: 8px;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cell.empty .cell-label {
      background: #fafafa;
      border-color: #eee;
      font-size: 9px;
      color: #999;
    }
    @keyframes pulse { from { transform: scale(1);} to { transform: scale(1.12);} }

    .panel { width: 340px; display: flex; flex-direction: column; gap: 12px; overflow: auto; }
    .card { padding: 16px; }
    .card h3 { margin: 0 0 10px; }
    .input { width: 100%; padding: 9px; margin: 4px 0 12px; border: 1px solid #d9d9d9; border-radius: 6px; }
    .stats { border: 1px solid #91d5ff; background: #e6f7ff; border-radius: 8px; padding: 10px; margin-bottom: 12px; }
    .stats.low { border-color: #ffa39e; background: #fff1f0; color: var(--danger); }
    .muted { color: var(--muted); font-size: 12px; }
    .warn-list { max-height: 180px; overflow: auto; font-size: 13px; }

    .overview-wrap { display: none; height: 100%; }
    .overview-filter {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 6px 0 12px;
      margin-bottom: 6px;
      border-bottom: 1px solid #f0f0f0;
    }
    .overview-chip {
      flex: 0 0 auto;
      border: 1px solid #d9d9d9;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      white-space: nowrap;
    }
    .overview-chip.active {
      border-color: currentColor;
      box-shadow: 0 0 0 1px rgba(0,0,0,.04) inset;
      font-weight: 600;
    }
    .overview-scroll {
      max-height: calc(100vh - 230px);
      overflow: auto;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      padding: 10px;
      background: #fafafa;
    }
    .overview-tree { display: flex; flex-direction: column; gap: 10px; }
    .ov-folder, .ov-box { border: 1px solid #ececec; border-radius: 8px; background: #fff; }
    .ov-folder-head, .ov-box-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 10px;
      cursor: pointer;
      user-select: none;
    }
    .ov-folder-head { font-weight: 700; }
    .ov-box-head { font-size: 13px; border-top: 1px dashed #f0f0f0; }
    .ov-arrow { width: 16px; text-align: center; color: #666; }
    .ov-meta { font-size: 12px; color: #888; }
    .ov-folder-body, .ov-box-body { padding: 0 10px 10px; }
    .ov-items { width: 100%; border-collapse: collapse; margin-top: 6px; }
    .ov-items th, .ov-items td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
    .ov-empty { color: #999; padding: 8px 2px; font-size: 12px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
    <aside class="sidebar">
    <div class="logo">🧪 freezer-1.3</div>

    <section class="sidebar-panel" style="flex:1;">
      <div class="sidebar-sub">位置 (Location)</div>
      <input id="folder-search" class="sidebar-search" type="text" placeholder="🔎 搜索位置..." oninput="handleFolderSidebarSearch()" />
      <div id="folder-list" class="list folder-list"></div>
      <div class="side-actions">
        <button class="side-btn" onclick="addFolder()">+ 新增文件夹</button>
        <button class="side-btn" onclick="sortFoldersByName()">管理/排序</button>
      </div>
    </section>

    <section class="sidebar-panel" style="flex:1;">
      <div class="sidebar-sub">容器 (Containers)</div>
      <div class="side-inline" style="justify-content:space-between;align-items:center;">
        <div id="box-filter-chips" class="side-inline"></div>
        <input id="box-search" class="sidebar-search" style="max-width:150px;padding:6px 8px;" type="text" placeholder="🔎 搜索容器..." oninput="handleBoxSidebarSearch()" />
      </div>
      <div id="box-list" class="list box-list"></div>
      <select id="new-box-folder" class="select-dark"></select>
      <select id="new-box-specs" class="select-dark">
        <option value="8,12" selected>规格: 96孔板 (8x12)</option>
        <option value="9,9">规格: 9x9 (81格)</option>
        <option value="10,10">规格: 10x10 (100格)</option>
        <option value="12,6">规格: 12x6 (72格)</option>
      </select>
      <button class="btn primary" style="width:100%" onclick="addBox()">+ 新建容器</button>
    </section>
  </aside>

  <main class="main">
    <div class="header">
      <div class="toolbar-toggle-bar">
        <button id="toolbar-toggle-btn" class="toolbar-toggle-btn" onclick="toggleTopToolbar()">展开工具栏</button>
      </div>
      <div id="top-toolbar" class="tool-sketch hidden">
        <div class="tool-row">
          <span class="tool-label">[ 🔎 全局搜索：细胞名/代数/条码 ]</span>
          <input id="global-search" class="tool-search" type="text" placeholder="输入关键词快速定位样本" oninput="handleGlobalSearch()" />
          <div id="search-dd" class="search-dd"></div>
        </div>

        <div class="tool-row" id="main-actions-card">
          <span class="tool-label">数据操作:</span>
          <button class="tool-link-btn" onclick="triggerImport()">导入</button>
          <button class="tool-link-btn" onclick="exportExcel()">导出Excel</button>
          <button class="tool-link-btn" onclick="exportJSON()">导出备份JSON</button>
          <span style="opacity:.75">|</span>
          <span class="tool-label">范围:</span>
          <select id="view-scope" class="tool-select" onchange="handleToolbarScopeChange()">
            <option value="grid">容器页面</option>
            <option value="overview">总览页面</option>
          </select>
          <input id="import-file" type="file" style="display:none" onchange="importJSON(event)" />
        </div>

        <div class="tool-row" id="backup-actions-card">
          <span class="tool-label">自动备份:</span>
          <label style="display:inline-flex;align-items:center;gap:6px;">
            <input id="backup-enable-switch" type="checkbox" onchange="toggleAutoBackupSwitch(this.checked)" />
            <span>开关</span>
          </label>
          <span class="tool-label">目录:</span>
          <span id="backup-dir-top">auto-backups</span>

            <option value="30">30min</option>

        </details>

    <section id="grid-view" class="content">
      <div class="view">
        <div id="empty-tip" class="empty-tip">请在左侧选择或新增一个容器</div>
        <div id="grid" class="grid"></div>
      </div>

      <div class="panel">
        <div class="card">
          <h3>📝 样本管理</h3>
          <div id="stats" class="stats">
            <div style="font-size:12px;">选定位置: <b id="sel-count">0</b></div>
            <div style="margin-top:6px;">全库总余量: <span id="total-inv" style="font-size:22px;font-weight:700">0</span> 管</div>
          </div>
          <label>细胞名称 (Name)</label>
          <input id="cell-name" class="input" type="text" placeholder="例如: HEK293T" oninput="updateLiveStats()" />

          <input id="cell-p" class="input" type="text" />
          <label>冻存日期</label>
          <input id="cell-date" class="input" type="date" />
          <button class="btn primary" style="width:100%" onclick="saveBatch()">保存并取消选择</button>
          <button class="btn" style="width:100%;margin-top:8px" onclick="clearBatch()">清空所选位置 (出库)</button>
        </div>

        <div class="card">
          <h3 style="color:var(--danger)">⚠️ 低库存预警</h3>
          <div id="warn-list" class="warn-list"></div>
        </div>
      </div>
    </section>

    <section id="overview-view" class="overview-wrap card">
      <h3>📊 文件夹/容器总览</h3>
      <div id="overview-folder-strip" class="overview-filter"></div>
      <div id="overview-scroll" class="overview-scroll" onwheel="handleOverviewWheel(event)">
        <div id="overview-tree" class="overview-tree"></div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'cell_storage_v1_2_db';
    const AUTO_BACKUP_KEY = 'cell_storage_v1_2_auto_backup_latest';
    const AUTO_BACKUP_LIST_KEY = 'cell_storage_v1_2_auto_backup_list';
    const AUTO_BACKUP_LIMIT = 10;
    const AUTO_BACKUP_DIR = 'auto-backups';
    const BACKUP_HANDLE_DB = 'cell_freezer_backup_handles';
    const BACKUP_HANDLE_STORE = 'handles';
    const AUTO_BACKUP_ENABLED_KEY = 'cell_freezer_auto_backup_enabled';
    const FIRST_LOAD_KEY = 'cell_freezer_first_load_done';
    const AUTO_BACKUP_AUTHORIZED_KEY = 'cell_freezer_auto_backup_authorized';
    const AUTO_BACKUP_MODE_KEY = 'cell_freezer_auto_backup_mode';
    const TOP_TOOLBAR_COLLAPSED_KEY = 'cell_freezer_top_toolbar_collapsed';
    const HEADER_SECTION_COLLAPSE_KEY = 'cell_freezer_header_section_collapse_state';

    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { folders: {}, boxes: {} };
    let currentBoxId = null;
    let currentFolderId = 'all';
    let selectedPositions = new Set();
    let searchHighlightPos = null;
    let draggedItemPos = null;
    let currentOverviewFolderId = 'all';
    let folderSearchKeyword = '';
    let boxSearchKeyword = '';
    let boxFilterMode = 'all';
    let collapsedOverviewFolders = new Set();
    let collapsedOverviewBoxes = new Set();
    const savedEnabledState = localStorage.getItem(AUTO_BACKUP_ENABLED_KEY);
    if (savedEnabledState === null) localStorage.setItem(AUTO_BACKUP_ENABLED_KEY, '1');
    let autoBackupEnabled = (savedEnabledState ?? '1') !== '0';

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }


    function openBackupHandleDb() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(BACKUP_HANDLE_DB, 1);
        req.onupgradeneeded = () => {
          const dbi = req.result;
          if (!dbi.objectStoreNames.contains(BACKUP_HANDLE_STORE)) dbi.createObjectStore(BACKUP_HANDLE_STORE);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function saveDirectoryHandle(handle) {
      try {
        const dbi = await openBackupHandleDb();
        await new Promise((resolve, reject) => {
          const tx = dbi.transaction(BACKUP_HANDLE_STORE, 'readwrite');
          tx.objectStore(BACKUP_HANDLE_STORE).put(handle, 'autoBackupDirHandle');
          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });
        dbi.close();
      } catch (err) {
        console.warn('保存目录句柄失败:', err);
      }
    }

    async function loadDirectoryHandle() {
      try {
        const dbi = await openBackupHandleDb();
        const handle = await new Promise((resolve, reject) => {
          const tx = dbi.transaction(BACKUP_HANDLE_STORE, 'readonly');
          const req = tx.objectStore(BACKUP_HANDLE_STORE).get('autoBackupDirHandle');
          req.onsuccess = () => resolve(req.result || null);
          req.onerror = () => reject(req.error);
        });
        dbi.close();
        return handle;
      } catch (err) {
        console.warn('读取目录句柄失败:', err);
        return null;
      }
    }


    async function verifyPermission(handle, readWrite = true, request = false) {
      if (!handle) return false;
      const opts = { mode: readWrite ? 'readwrite' : 'read' };
      const q = await handle.queryPermission(opts);
      if (q === 'granted') return true;
      if (!request) return false;
      try {
        const r = await handle.requestPermission(opts);
        return r === 'granted';
      } catch {
        return false;
      }
    }


    async function clearDirectoryHandle() {
      try {
        const dbi = await openBackupHandleDb();
        await new Promise((resolve, reject) => {
          const tx = dbi.transaction(BACKUP_HANDLE_STORE, 'readwrite');
          tx.objectStore(BACKUP_HANDLE_STORE).delete('autoBackupDirHandle');
          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });
        dbi.close();
      } catch (err) {
        console.warn('清理目录句柄失败:', err);
      }
    }

    async function ensureWritableBackupDir(interactive = false, forcePick = false) {
      if (!('showDirectoryPicker' in window)) return null;
      let dirHandle = forcePick ? null : await loadDirectoryHandle();
      if (!dirHandle && interactive) {
        dirHandle = await window.showDirectoryPicker({ id: 'freezer-auto-backup-dir', mode: 'readwrite' });
        await saveDirectoryHandle(dirHandle);
      }
      if (!dirHandle) return null;

      const granted = await verifyPermission(dirHandle, true, interactive);
      if (!granted) return null;

      return await dirHandle.getDirectoryHandle(AUTO_BACKUP_DIR, { create: true });
    }

    async function writeBackupFileToFolder(fileName, content) {
      try {
        const backupDir = await ensureWritableBackupDir(false);
        if (!backupDir) return false;
        const fileHandle = await backupDir.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(content);
        await writable.close();
        return true;
      } catch (err) {
        console.warn('写入文件夹自动备份失败:', err);
        return false;
      }
    }

    function setBackupStatus(text, mode = 'local') {
      const targets = [document.getElementById('backup-status'), document.getElementById('backup-status-top')].filter(Boolean);
      targets.forEach(el => {
        el.textContent = text;
        el.classList.remove('local', 'off', 'ok', 'tool-status');
        el.classList.add('tool-status');
        if (mode === 'folder') el.classList.add('ok');
      });
      const dirTop = document.getElementById('backup-dir-top');
      if (dirTop) dirTop.textContent = AUTO_BACKUP_DIR;
      const sw = document.getElementById('backup-enable-switch');
      if (sw) sw.checked = autoBackupEnabled;
      const log = document.getElementById('last-backup-log');
      if (log && localStorage.getItem(AUTO_BACKUP_KEY)) {
        try {
          const latest = JSON.parse(localStorage.getItem(AUTO_BACKUP_KEY));
          if (latest?.savedAt) log.textContent = new Date(latest.savedAt).toLocaleTimeString('zh-CN', { hour12: false });
        } catch {}
      }
    }

    async function refreshBackupStatus() {
      const el = document.getElementById('backup-status');
      if (!el) return;
      if (!('showDirectoryPicker' in window)) {
        setBackupStatus('自动备份：当前浏览器不支持（仅本地备份）', 'local');
        return;
      }
      if (!autoBackupEnabled) {
        setBackupStatus('自动备份：已关闭', 'off');
        return;
      }
      const writable = await ensureWritableBackupDir(false);
      const everAuthorized = localStorage.getItem(AUTO_BACKUP_AUTHORIZED_KEY) === '1';
      const mode = writable ? 'folder' : 'local';
      localStorage.setItem(AUTO_BACKUP_MODE_KEY, mode);
      setBackupStatus(
        writable
          ? `自动备份：开启（文件夹 ${AUTO_BACKUP_DIR}）`
          : (everAuthorized
            ? '自动备份：开启（本地备份进行中，目录权限待系统恢复）'
            : '自动备份：开启（本地备份进行中，尚未授权目录）'),
        mode
      );
    }

    async function enableFolderAutoBackup() {
      autoBackupEnabled = true;
      localStorage.setItem(AUTO_BACKUP_ENABLED_KEY, '1');
      if (!('showDirectoryPicker' in window)) {
        await refreshBackupStatus();
        return alert('当前浏览器不支持目录写入 API，将仅使用本地自动备份。');
      }
      try {
        await ensureWritableBackupDir(true);
        localStorage.setItem(AUTO_BACKUP_AUTHORIZED_KEY, '1');
        localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'folder');
        await refreshBackupStatus();
        saveAutoBackup('grant-folder-backup');
        alert('已启用自动备份。后续将自动写入 auto-backups 目录。');
      } catch (err) {
        console.warn(err);
        await refreshBackupStatus();
        alert('未完成授权，当前将仅使用本地自动备份。');
      }
    }

    async function changeBackupFolder() {
      if (!('showDirectoryPicker' in window)) return alert('当前浏览器不支持目录写入 API。');
      try {
        autoBackupEnabled = true;
        localStorage.setItem(AUTO_BACKUP_ENABLED_KEY, '1');
        await ensureWritableBackupDir(true, true);
        localStorage.setItem(AUTO_BACKUP_AUTHORIZED_KEY, '1');
        localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'folder');
        await refreshBackupStatus();
        saveAutoBackup('change-folder');
        alert('备份文件夹已更新。');
      } catch (err) {
        console.warn(err);
        alert('未完成文件夹更换。');
      }
    }

    async function disableAutoBackup() {
      autoBackupEnabled = false;
      localStorage.setItem(AUTO_BACKUP_ENABLED_KEY, '0');
      localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'off');
      localStorage.removeItem(AUTO_BACKUP_AUTHORIZED_KEY);
      await clearDirectoryHandle();
      await refreshBackupStatus();
      alert('自动备份已关闭。');
    }




    async function restoreBackupPermissionOnLoad() {
      if (!autoBackupEnabled || !('showDirectoryPicker' in window)) return false;
      try {
        // 仅做静默恢复，不在页面加载时弹权限框（按需只在“启用/更改文件夹”时请求）
        const handle = await loadDirectoryHandle();
        if (!handle) {
          localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'local');
          return false;
        }
        const granted = await verifyPermission(handle, true, false);
        if (!granted) {
          localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'local');
          return false;
        }
        const writableDir = await ensureWritableBackupDir(false);
        if (!writableDir) {
          localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'local');
          return false;
        }
        localStorage.setItem(AUTO_BACKUP_AUTHORIZED_KEY, '1');
        localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'folder');
        return true;
      } catch (err) {
        console.warn('恢复备份目录权限失败:', err);
        localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'local');
        return false;
      }
    }

    function getDailyBackupFileName(date = new Date()) {
      return `backup_${date.toISOString().slice(0, 10)}.json`;
    }

    function upsertDailyBackupRecord(folder, filePayload) {
      folder.files = folder.files || [];
      const idx = folder.files.findIndex(f => f.name === filePayload.name);
      if (idx >= 0) folder.files[idx] = filePayload;
      else folder.files.unshift(filePayload);
      folder.files = folder.files
        .sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''))
        .slice(0, AUTO_BACKUP_LIMIT);
      return folder;
    }

    function loadLatestBackupDataFromLocal() {
      try {
        const folder = JSON.parse(localStorage.getItem(AUTO_BACKUP_LIST_KEY) || '{"dir":"auto-backups","files":[]}');
        const files = (folder.files || []).slice().sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''));
        const latest = files[0];
        if (!latest || !latest.content) return null;
        const data = JSON.parse(latest.content);
        if (!data || typeof data !== 'object' || !data.boxes) return null;
        return data;
      } catch (err) {
        console.warn('读取最新备份失败:', err);
        return null;
      }
    }

    function saveAutoBackup(reason = 'manual') {
      if (!autoBackupEnabled) return;
      try {
        const savedAt = new Date().toISOString();
        const fileName = getDailyBackupFileName(new Date(savedAt));
        const jsonContent = JSON.stringify(db, null, 2);

        const filePayload = {
          dir: AUTO_BACKUP_DIR,
          name: fileName,
          reason,
          savedAt,
          content: jsonContent
        };
        localStorage.setItem(AUTO_BACKUP_KEY, JSON.stringify(filePayload));

        const folder = JSON.parse(localStorage.getItem(AUTO_BACKUP_LIST_KEY) || '{"dir":"auto-backups","files":[]}');
        folder.dir = AUTO_BACKUP_DIR;
        upsertDailyBackupRecord(folder, filePayload);
        localStorage.setItem(AUTO_BACKUP_LIST_KEY, JSON.stringify(folder));

        // 文件夹写入为增强能力；即使失败也持续进行本地自动备份（无需手动再次启用）
        writeBackupFileToFolder(fileName, jsonContent)
          .then(ok => localStorage.setItem(AUTO_BACKUP_MODE_KEY, ok ? 'folder' : 'local'))
          .catch(() => localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'local'));
      } catch (err) {
        console.warn('自动备份失败:', err);
      }
    }

    function registerAutoBackupHooks() {
      const autoBackup = () => saveAutoBackup('page-close');
      window.addEventListener('beforeunload', autoBackup);
      window.addEventListener('pagehide', autoBackup);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') saveAutoBackup('visibility-hidden');
      });
    }

    function loadHeaderSectionState() {
      try {
        return JSON.parse(localStorage.getItem(HEADER_SECTION_COLLAPSE_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function saveHeaderSectionState(state) {
      localStorage.setItem(HEADER_SECTION_COLLAPSE_KEY, JSON.stringify(state));
    }

    function applyHeaderSectionState() {
      // 新版工具条不再使用分块收起，历史状态忽略并确保显示
      const mainCard = document.getElementById('main-actions-card');
      const backupCard = document.getElementById('backup-actions-card');
      if (mainCard) mainCard.classList.remove('hidden');
      if (backupCard) backupCard.classList.remove('hidden');
    }

    function setHeaderSectionCollapsed(sectionId, collapsed) {
      const state = loadHeaderSectionState();
      state[sectionId] = collapsed;
      saveHeaderSectionState(state);
      applyHeaderSectionState();
    }

    function toggleHeaderSection(sectionId) {
      const state = loadHeaderSectionState();
      setHeaderSectionCollapsed(sectionId, !(state[sectionId] === true));
    }

    function expandHeaderSection(sectionId) {
      setHeaderSectionCollapsed(sectionId, false);
    }

    function normalizeData() {
      let changed = false;
      if (!db.folders || typeof db.folders !== 'object') { db.folders = {}; changed = true; }
      if (!db.boxes || typeof db.boxes !== 'object') { db.boxes = {}; changed = true; }
      if (!Object.keys(db.folders).length) { db.folders.default = { name: '默认位置' }; changed = true; }

      Object.values(db.boxes).forEach(box => {
        if (box.size && !box.rows) { box.rows = box.size; box.cols = box.size; changed = true; }
        if (!box.rows) { box.rows = 8; changed = true; }
        if (!box.cols) { box.cols = 12; changed = true; }
        if (!box.vials) { box.vials = {}; changed = true; }
        if (!box.folderId || !db.folders[box.folderId]) { box.folderId = 'default'; changed = true; }
      });

      if (changed) save();
    }


    function handleToolbarScopeChange() {
      const v = document.getElementById('view-scope')?.value || 'grid';
      switchView(v === 'overview' ? 'overview' : 'grid');
    }

    async function toggleAutoBackupSwitch(checked) {
      if (checked) await enableFolderAutoBackup();
      else await disableAutoBackup();
    }

    function runImmediateBackup() {
      saveAutoBackup('manual-toolbar');
      const log = document.getElementById('last-backup-log');
      if (log) log.textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      alert('已触发立即备份。');
    }


    function isTopToolbarCollapsed() {
      const raw = localStorage.getItem(TOP_TOOLBAR_COLLAPSED_KEY);
      if (raw === null) {
        localStorage.setItem(TOP_TOOLBAR_COLLAPSED_KEY, '1');
        return true;
      }
      return raw === '1';
    }

    function applyTopToolbarCollapsedState() {
      const toolbar = document.getElementById('top-toolbar');
      const btn = document.getElementById('toolbar-toggle-btn');
      if (!toolbar || !btn) return;
      const collapsed = isTopToolbarCollapsed();
      toolbar.classList.toggle('hidden', collapsed);
      btn.textContent = collapsed ? '展开工具栏' : '收起工具栏';
    }

    function toggleTopToolbar() {
      const next = isTopToolbarCollapsed() ? '0' : '1';
      localStorage.setItem(TOP_TOOLBAR_COLLAPSED_KEY, next);
      applyTopToolbarCollapsedState();
    }

    async function init() {
      registerAutoBackupHooks();

      const firstLoadDone = localStorage.getItem(FIRST_LOAD_KEY) === '1';
      if (firstLoadDone) {
        const latest = loadLatestBackupDataFromLocal();
        if (latest) db = latest;
      } else {
        localStorage.setItem(FIRST_LOAD_KEY, '1');
      }

      normalizeData();
      renderFolderOptions();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      renderBoxFilters();
      updateWarningBoard();
      renderOverviewFolderStrip();
      updateOverview();

      await restoreBackupPermissionOnLoad();
      refreshBackupStatus();
      applyHeaderSectionState();
      applyTopToolbarCollapsedState();
      if (!Object.keys(db.boxes).length) document.getElementById('empty-tip').style.display = 'block';
    }

    function getFolderColor(folderId) {
      const palette = ['#1677ff', '#13c2c2', '#722ed1', '#eb2f96', '#fa8c16', '#52c41a', '#2f54eb', '#f5222d'];
      if (!folderId || folderId === 'all') return '#69c0ff';
      let hash = 0;
      for (let i = 0; i < folderId.length; i++) hash = folderId.charCodeAt(i) + ((hash << 5) - hash);
      return palette[Math.abs(hash) % palette.length];
    }

    function setFolderFilter(folderId) {
      currentFolderId = folderId;
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
    }

    function setOverviewFolderFilter(folderId) {
      currentOverviewFolderId = folderId;
      renderOverviewFolderStrip();
      updateOverview();
    }

    function renderOverviewFolderStrip() {
      const strip = document.getElementById('overview-folder-strip');
      const folderIds = Object.keys(db.folders);
      strip.innerHTML = [
        `<div class="overview-chip ${currentOverviewFolderId === 'all' ? 'active' : ''}" onclick="setOverviewFolderFilter('all')">全部文件夹</div>`,
        ...folderIds.map(fid => `<div class="overview-chip ${currentOverviewFolderId === fid ? 'active' : ''}" style="color:${getFolderColor(fid)}" onclick="setOverviewFolderFilter('${fid}')">${db.folders[fid].name}</div>`)
      ].join('');
    }


    function handleFolderSidebarSearch() {
      folderSearchKeyword = (document.getElementById('folder-search')?.value || '').trim().toLowerCase();
      renderFolderList();
    }

    function handleBoxSidebarSearch() {
      boxSearchKeyword = (document.getElementById('box-search')?.value || '').trim().toLowerCase();
      renderBoxList();
    }

    function sortFoldersByName() {
      const entries = Object.entries(db.folders).sort((a, b) => {
        if (a[0] === 'default') return -1;
        if (b[0] === 'default') return 1;
        return (a[1].name || '').localeCompare(b[1].name || '', 'zh-CN');
      });
      db.folders = Object.fromEntries(entries);
      save();
      renderFolderOptions();
      renderFolderList();
      renderBoxList();
    }

    function getLowInventoryNames() {
      const counts = {};
      Object.values(db.boxes).forEach(b => Object.values(b.vials || {}).forEach(v => {
        if (v && v.name) counts[v.name] = (counts[v.name] || 0) + 1;
      }));
      return new Set(Object.keys(counts).filter(name => counts[name] <= 3));
    }

    function renderBoxFilters() {
      const el = document.getElementById('box-filter-chips');
      if (!el) return;
      const lowNames = getLowInventoryNames();
      const lowBoxCount = Object.values(db.boxes).filter(b => Object.values(b.vials || {}).some(v => v?.name && lowNames.has(v.name))).length;
      el.innerHTML = `
        <button class="side-filter ${boxFilterMode === 'all' ? 'active' : ''}" onclick="setBoxFilterMode('all')">全部 ${Object.keys(db.boxes).length}</button>
        <button class="side-filter ${boxFilterMode === 'low' ? 'active' : ''}" onclick="setBoxFilterMode('low')">低库存 ${lowBoxCount}</button>
      `;
    }

    function setBoxFilterMode(mode) {
      boxFilterMode = mode;
      renderBoxFilters();
      renderBoxList();
    }

    function addFolder() {
      const name = prompt('请输入位置文件夹名称：');
      if (!name) return;
      const id = 'folder_' + Date.now();
      db.folders[id] = { name: name.trim() };
      currentFolderId = id;
      save();
      renderFolderOptions();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function renameFolder(id, e) {
      e.stopPropagation();
      const next = prompt('请输入新的文件夹名称：', db.folders[id]?.name || '');
      if (!next) return;
      db.folders[id].name = next.trim();
      save();
      renderFolderOptions();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function deleteFolder(id, e) {
      e.stopPropagation();
      if (id === 'default') return alert('默认位置不可删除。');
      const related = Object.values(db.boxes).filter(b => b.folderId === id).length;
      if (related > 0) {
        const target = prompt(`该文件夹下有 ${related} 个容器。
请输入要迁移到的目标文件夹名称（留空取消）：`, db.folders.default?.name || '默认位置');
        if (!target) return;
        const targetId = Object.keys(db.folders).find(fid => db.folders[fid].name === target.trim());
        if (!targetId) return alert('未找到目标文件夹名称，请重试。');
        if (targetId === id) return alert('目标文件夹不能和待删除文件夹相同。');
        Object.values(db.boxes).forEach(box => {
          if (box.folderId === id) box.folderId = targetId;
        });
      }
      if (!confirm(`确定删除文件夹【${db.folders[id].name}】吗？`)) return;
      delete db.folders[id];
      if (currentFolderId === id) currentFolderId = 'all';
      save();
      renderFolderOptions();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function renderFolderOptions() {
      const sel = document.getElementById('new-box-folder');
      sel.innerHTML = Object.keys(db.folders).map(id => `<option value="${id}">位置: ${db.folders[id].name}</option>`).join('');
    }

    function renderFolderList() {
      const list = document.getElementById('folder-list');
      list.innerHTML = '';

      const totalBoxes = Object.keys(db.boxes).length;
      const allItem = document.createElement('div');
      allItem.className = `item tree-item ${currentFolderId === 'all' ? 'active' : ''}`;
      allItem.innerHTML = `<div class="item-info"><span class="tree-arrow">▾</span>全部位置</div><div class="item-tag">${totalBoxes}</div>`;
      allItem.onclick = () => setFolderFilter('all');
      list.appendChild(allItem);

      Object.keys(db.folders).filter(id => {
        if (!folderSearchKeyword) return true;
        return (db.folders[id].name || '').toLowerCase().includes(folderSearchKeyword);
      }).forEach(id => {
        const folder = db.folders[id];
        const count = Object.values(db.boxes).filter(b => b.folderId === id).length;
        const div = document.createElement('div');
        div.className = `item folder-item tree-item ${currentFolderId === id ? 'active' : ''}`;
        div.style.borderLeftColor = getFolderColor(id);
        div.innerHTML = `
          <div class="item-info"><span class="tree-arrow">▸</span>${folder.name}<span class="item-tag">${count}</span></div>
          <div>
            <button class="mini-btn" title="重命名" onclick="renameFolder('${id}',event)">✎</button>
            <button class="mini-btn danger" title="删除" onclick="deleteFolder('${id}',event)">🗑</button>
          </div>
        `;
        div.onclick = () => setFolderFilter(id);
        list.appendChild(div);
      });
    }

    function renderBoxFolderStrip() {
      const strip = document.getElementById('box-folder-strip');
      if (!strip) return;
      const folderIds = Object.keys(db.folders);
      const total = Object.keys(db.boxes).length;
      strip.innerHTML = [
        `<div class="folder-chip all ${currentFolderId === 'all' ? 'active' : ''}" onclick="setFolderFilter('all')">全部 · ${total}</div>`,
        ...folderIds.map(fid => {
          const count = Object.values(db.boxes).filter(b => b.folderId === fid).length;
          return `<div class="folder-chip ${currentFolderId === fid ? 'active' : ''}" style="color:${getFolderColor(fid)}" onclick="setFolderFilter('${fid}')">${db.folders[fid].name} · ${count}</div>`;
        })
      ].join('');
    }

    function addBox() {
      const name = prompt('请输入容器名称（例如：96孔板-1）：');
      if (!name) return;
      const [rows, cols] = document.getElementById('new-box-specs').value.split(',').map(Number);
      const folderId = document.getElementById('new-box-folder').value;
      const id = 'box_' + Date.now();
      db.boxes[id] = { name: name.trim(), rows, cols, folderId, vials: {} };
      save();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      switchBox(id);
      renderOverviewFolderStrip();
      updateOverview();
    }

    function moveBoxFolder(id, e) {
      e.stopPropagation();
      const box = db.boxes[id];
      if (!box) return;
      const options = Object.keys(db.folders)
        .map((fid, idx) => `${idx + 1}. ${db.folders[fid].name}${fid === box.folderId ? '（当前）' : ''}`)
        .join('\n');
      const input = prompt(`请选择目标文件夹序号：
${options}`);
      if (!input) return;
      const n = Number(input);
      const folderIds = Object.keys(db.folders);
      if (!Number.isInteger(n) || n < 1 || n > folderIds.length) return alert('输入序号无效。');
      const targetId = folderIds[n - 1];
      if (targetId === box.folderId) return;
      box.folderId = targetId;
      save();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function deleteBox(id, e) {
      e.stopPropagation();
      if (!confirm(`确定删除容器【${db.boxes[id].name}】及其内所有样本吗？`)) return;
      delete db.boxes[id];
      if (currentBoxId === id) {
        currentBoxId = null;
        document.getElementById('grid').innerHTML = '';
        document.getElementById('empty-tip').style.display = 'block';
      }
      selectedPositions.clear();
      save();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      updatePanel();
      updateWarningBoard();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function renderBoxList() {
      const list = document.getElementById('box-list');
      list.innerHTML = '';
      renderBoxFilters();
      const lowNames = getLowInventoryNames();
      const ids = Object.keys(db.boxes).filter(id => {
        const b = db.boxes[id];
        if (boxSearchKeyword && !(b.name || '').toLowerCase().includes(boxSearchKeyword)) return false;
        if (boxFilterMode === 'low') return Object.values(b.vials || {}).some(v => v?.name && lowNames.has(v.name));
        return true;
      });

      const renderBoxItem = (id) => {
        const b = db.boxes[id];
        const folderName = db.folders[b.folderId]?.name || '未分类';
        const div = document.createElement('div');
        div.className = `item box-item ${id === currentBoxId ? 'active' : ''}`;
        div.style.borderLeftColor = getFolderColor(b.folderId);
        div.innerHTML = `
          <div class="item-info">
            <div class="box-name">${b.name}</div>
            <div class="box-meta">
              <span class="box-meta-badge">${b.rows}x${b.cols}</span>
              ${currentFolderId === 'all' ? `<span class="box-meta-badge">${folderName}</span>` : ''}
            </div>
          </div>
          <div>
            <button class="mini-btn" title="移动到其他文件夹" onclick="moveBoxFolder('${id}',event)">📁</button>
            <button class="mini-btn danger" title="删除容器" onclick="deleteBox('${id}',event)">✕</button>
          </div>
        `;
        div.onclick = () => { searchHighlightPos = null; switchBox(id); };
        list.appendChild(div);
      };

      if (currentFolderId !== 'all') {
        ids.filter(id => db.boxes[id].folderId === currentFolderId).forEach(renderBoxItem);
        return;
      }

      const grouped = {};
      ids.forEach(id => {
        const fid = db.boxes[id].folderId || 'default';
        if (!grouped[fid]) grouped[fid] = [];
        grouped[fid].push(id);
      });

      Object.keys(db.folders).forEach(fid => {
        const folderIds = grouped[fid] || [];
        if (!folderIds.length) return;
        const title = document.createElement('div');
        title.className = 'box-group-title';
        title.style.background = getFolderColor(fid);
        title.innerHTML = `<span>${db.folders[fid].name}</span><span>${folderIds.length}</span>`;
        list.appendChild(title);
        folderIds.forEach(renderBoxItem);
      });
    }

    function switchBox(id) {
      currentBoxId = id;
      selectedPositions.clear();
      document.getElementById('empty-tip').style.display = 'none';
      renderGrid();
      renderBoxList();
      updatePanel();
    }


    function getDisplayLayout(box) {
      // 12x6 规格按横向展示：6行x12列（仅改变可视化，不改存储坐标）
      if (box.rows === 12 && box.cols === 6) {
        return {
          renderRows: 6,
          renderCols: 12,
          toPos: (r, c) => `${c}-${r}`
        };
      }
      return {
        renderRows: box.rows,
        renderCols: box.cols,
        toPos: (r, c) => `${r}-${c}`
      };
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      if (!currentBoxId || !db.boxes[currentBoxId]) return;

      const box = db.boxes[currentBoxId];
      const layout = getDisplayLayout(box);
      grid.style.gridTemplateColumns = `repeat(${layout.renderCols}, 48px)`;

      for (let r = 1; r <= layout.renderRows; r++) {
        for (let c = 1; c <= layout.renderCols; c++) {
          const pos = layout.toPos(r, c);
          const vial = box.vials[pos];
          const el = document.createElement('div');
          el.className = 'cell';
          el.id = `cell-${pos}`;

          if (vial && vial.name) {
            el.classList.add('occupied');
            el.style.backgroundColor = stringToHslColor(vial.name);
            el.title = `位置: ${pos}\n名称: ${vial.name}\n代数: ${vial.p || '-'}\n日期: ${vial.date || '-'}`;
            el.innerHTML = `<div class="cell-label">${vial.name}</div><div class="cell-sub">${vial.p || 'P-'}</div>`;
            el.setAttribute('draggable', 'true');
            el.addEventListener('dragstart', (e) => handleDragStart(e, pos));
            el.addEventListener('dragend', handleDragEnd);
          } else {
            el.classList.add('empty');
            el.innerHTML = `<div class="cell-label">${pos}</div>`;
            el.addEventListener('dragover', handleDragOver);
            el.addEventListener('dragenter', function(){ this.classList.add('drag-over'); });
            el.addEventListener('dragleave', function(){ this.classList.remove('drag-over'); });
            el.addEventListener('drop', (e) => handleDrop(e, pos));
          }

          if (selectedPositions.has(pos)) el.classList.add('selected');
          if (searchHighlightPos === pos) el.classList.add('highlight');
          el.addEventListener('click', () => { searchHighlightPos = null; toggleSelect(pos); });
          grid.appendChild(el);
        }
      }
    }

    function stringToHslColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return `hsl(${Math.abs(hash) % 360}, 60%, 88%)`;
    }

    function handleDragStart(e, pos) {
      draggedItemPos = pos;
      e.dataTransfer.effectAllowed = 'move';
      e.target.style.opacity = '.5';
    }
    function handleDragEnd(e) {
      e.target.style.opacity = '1';
      document.querySelectorAll('.cell').forEach(el => el.classList.remove('drag-over'));
    }
    function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function handleDrop(e, targetPos) {
      e.stopPropagation();
      const box = db.boxes[currentBoxId];
      if (!box || !draggedItemPos || draggedItemPos === targetPos) return;
      if (box.vials[targetPos]) return alert('目标位置已有样本，请先清空目标位置。');
      box.vials[targetPos] = box.vials[draggedItemPos];
      delete box.vials[draggedItemPos];
      save();
      renderGrid();
      updateOverview();
    }

    function toggleSelect(pos) {
      if (selectedPositions.has(pos)) selectedPositions.delete(pos); else selectedPositions.add(pos);
      renderGrid();
      updatePanel();
    }

    function updatePanel() {
      document.getElementById('sel-count').textContent = selectedPositions.size;
      if (selectedPositions.size === 1 && currentBoxId) {
        const pos = [...selectedPositions][0];
        const data = db.boxes[currentBoxId].vials[pos] || {};
        document.getElementById('cell-name').value = data.name || '';
        document.getElementById('cell-p').value = data.p || '';
        document.getElementById('cell-date').value = data.date || '';
      }
      updateLiveStats();
    }

    function updateLiveStats() {
      const key = document.getElementById('cell-name').value.trim().toLowerCase();
      const total = document.getElementById('total-inv');
      const stats = document.getElementById('stats');
      if (!key) { total.textContent = '0'; stats.classList.remove('low'); return; }
      let cnt = 0;
      Object.values(db.boxes).forEach(b => Object.values(b.vials).forEach(v => {
        if (v.name && v.name.toLowerCase() === key) cnt++;
      }));
      total.textContent = cnt;
      if (cnt > 0 && cnt <= 3) stats.classList.add('low'); else stats.classList.remove('low');
    }

    function saveBatch() {
      if (!currentBoxId || !selectedPositions.size) return alert('请先选择格子。');
      const name = document.getElementById('cell-name').value.trim();
      if (!name) return alert('细胞名称必填。');

      const payload = {
        name,
        p: document.getElementById('cell-p').value.trim(),
        date: document.getElementById('cell-date').value
      };
      selectedPositions.forEach(pos => { db.boxes[currentBoxId].vials[pos] = { ...payload }; });
      selectedPositions.clear();
      save();
      renderGrid();
      updatePanel();
      updateWarningBoard();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function clearBatch() {
      if (!selectedPositions.size) return;
      if (!confirm('确定清空所选位置吗？')) return;
      selectedPositions.forEach(pos => delete db.boxes[currentBoxId].vials[pos]);
      selectedPositions.clear();
      save();
      renderGrid();
      updatePanel();
      updateWarningBoard();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function handleGlobalSearch() {
      const term = document.getElementById('global-search').value.trim().toLowerCase();
      const dd = document.getElementById('search-dd');
      if (!term) { dd.style.display = 'none'; return; }

      const rows = [];
      Object.keys(db.boxes).forEach(boxId => {
        const box = db.boxes[boxId];
        Object.keys(box.vials).forEach(pos => {
          const v = box.vials[pos];
          const n = (v.name || '').toLowerCase();
          const p = (v.p || '').toLowerCase();
          if (n.includes(term) || p.includes(term)) {
            rows.push({ boxId, pos, name: v.name || '-', p: v.p || '-', boxName: box.name, folderName: db.folders[box.folderId]?.name || '-' });
          }
        });
      });

      dd.innerHTML = rows.length
        ? rows.map(r => `
          <div class="search-item" onclick="jumpTo('${r.boxId}','${r.pos}')">
            <div><b>${r.name}</b> <span class="muted">(${r.p})</span></div>
            <div class="loc-tag">${r.folderName}/${r.boxName} [${r.pos}]</div>
          </div>
        `).join('')
        : '<div style="padding:12px;color:#999">未找到匹配样本</div>';
      dd.style.display = 'block';
    }

    function jumpTo(boxId, pos) {
      document.getElementById('search-dd').style.display = 'none';
      document.getElementById('global-search').value = '';
      currentFolderId = db.boxes[boxId].folderId || 'all';
      renderFolderList();
      renderBoxFolderStrip();
      searchHighlightPos = pos;
      switchBox(boxId);
      setTimeout(() => {
        const el = document.getElementById(`cell-${pos}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 150);
    }

    function updateWarningBoard() {
      const w = document.getElementById('warn-list');
      const counts = {};
      Object.values(db.boxes).forEach(b => Object.values(b.vials).forEach(v => {
        if (v.name) counts[v.name] = (counts[v.name] || 0) + 1;
      }));
      const lows = Object.keys(counts).filter(name => counts[name] <= 3);
      w.innerHTML = lows.length
        ? lows.map(name => `<div style="padding:8px;display:flex;justify-content:space-between;border-bottom:1px solid #f0f0f0"><span>${name}</span><b style="color:var(--danger)">余${counts[name]}</b></div>`).join('')
        : '<div style="color:#bfbfbf;text-align:center;">✅ 库存充足</div>';
    }

    function switchView(view) {
      document.getElementById('grid-view').style.display = view === 'grid' ? 'flex' : 'none';
      document.getElementById('overview-view').style.display = view === 'overview' ? 'block' : 'none';
      if (view === 'overview') { renderOverviewFolderStrip(); updateOverview(); }
    }


    function toggleOverviewFolder(folderId) {
      if (collapsedOverviewFolders.has(folderId)) collapsedOverviewFolders.delete(folderId);
      else collapsedOverviewFolders.add(folderId);
      updateOverview();
    }

    function toggleOverviewBox(boxId) {
      if (collapsedOverviewBoxes.has(boxId)) collapsedOverviewBoxes.delete(boxId);
      else collapsedOverviewBoxes.add(boxId);
      updateOverview();
    }

    function handleOverviewWheel(e) {
      const el = document.getElementById('overview-scroll');
      if (!el) return;
      el.scrollTop += e.deltaY;
    }

    function updateOverview() {
      const tree = document.getElementById('overview-tree');
      const folderIds = currentOverviewFolderId === 'all' ? Object.keys(db.folders) : [currentOverviewFolderId].filter(fid => db.folders[fid]);
      const chunks = [];

      folderIds.forEach(fid => {
        const folder = db.folders[fid];
        const boxes = Object.keys(db.boxes)
          .filter(boxId => db.boxes[boxId].folderId === fid)
          .sort((a, b) => (db.boxes[a].name || '').localeCompare(db.boxes[b].name || '', 'zh-CN'));

        const folderTotal = boxes.reduce((sum, boxId) => {
          const b = db.boxes[boxId];
          return sum + Object.values(b.vials || {}).filter(v => v && v.name).length;
        }, 0);

        const folderCollapsed = collapsedOverviewFolders.has(fid);
        let folderBody = '<div class="ov-folder-body">';

        if (!boxes.length) {
          folderBody += '<div class="ov-empty">该文件夹暂无容器</div>';
        } else {
          boxes.forEach(boxId => {
            const b = db.boxes[boxId];
            const counts = {};
            Object.values(b.vials || {}).forEach(v => {
              if (!v || !v.name) return;
              counts[v.name] = (counts[v.name] || 0) + 1;
            });
            const names = Object.keys(counts).sort((a, b) => counts[b] - counts[a] || a.localeCompare(b, 'zh-CN'));
            const boxTotal = names.reduce((sum, name) => sum + counts[name], 0);
            const boxCollapsed = collapsedOverviewBoxes.has(boxId);

            let boxBody = '<div class="ov-box-body">';
            if (!names.length) {
              boxBody += '<div class="ov-empty">容器内暂无样本</div>';
            } else {
              boxBody += '<table class="ov-items"><thead><tr><th>样本名</th><th>数量</th></tr></thead><tbody>';
              names.forEach(name => { boxBody += `<tr><td>${name}</td><td>${counts[name]}</td></tr>`; });
              boxBody += '</tbody></table>';
            }
            boxBody += '</div>';

            folderBody += `
              <div class="ov-box">
                <div class="ov-box-head" onclick="toggleOverviewBox('${boxId}')">
                  <div><span class="ov-arrow">${boxCollapsed ? '▶' : '▼'}</span>${b.name} <span class="ov-meta">(${b.rows}x${b.cols})</span></div>
                  <div class="ov-meta">总计 ${boxTotal} 管</div>
                </div>
                ${boxCollapsed ? '' : boxBody}
              </div>
            `;
          });
        }

        folderBody += '</div>';
        chunks.push(`
          <div class="ov-folder" style="border-left:4px solid ${getFolderColor(fid)}">
            <div class="ov-folder-head" onclick="toggleOverviewFolder('${fid}')">
              <div><span class="ov-arrow">${folderCollapsed ? '▶' : '▼'}</span>${folder.name}</div>
              <div class="ov-meta">容器 ${boxes.length} | 样本 ${folderTotal}</div>
            </div>
            ${folderCollapsed ? '' : folderBody}
          </div>
        `);
      });

      tree.innerHTML = chunks.length ? chunks.join('') : '<div class="ov-empty">暂无数据</div>';
    }

    function exportExcel() {
      if (typeof XLSX === 'undefined') {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' }));
        a.download = `Cell_Storage_Export_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        return;
      }

      const wb = XLSX.utils.book_new();
      const boxIds = Object.keys(db.boxes);
      if (!boxIds.length) {
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([['暂无数据']]), '空数据');
        XLSX.writeFile(wb, `Cell_Storage_Export_${new Date().toISOString().slice(0,10)}.xlsx`);
        return;
      }

      boxIds.forEach((boxId, idx) => {
        const b = db.boxes[boxId];
        const folderName = db.folders[b.folderId]?.name || '未分类';
        const layout = getDisplayLayout(b);

        const aoa = [];
        aoa.push([`文件夹: ${folderName}`, `容器: ${b.name}`, `规格: ${b.rows}x${b.cols}`]);

        const header = ['行\列'];
        for (let c = 1; c <= layout.renderCols; c++) header.push(`C${c}`);
        aoa.push(header);

        for (let r = 1; r <= layout.renderRows; r++) {
          const row = [`R${r}`];
          for (let c = 1; c <= layout.renderCols; c++) {
            const pos = layout.toPos(r, c);
            const v = b.vials[pos];
            row.push(v?.name ? `${v.name}${v.p ? ` (${v.p})` : ''}` : '');
          }
          aoa.push(row);
        }

        const sheet = XLSX.utils.aoa_to_sheet(aoa);
        sheet['!cols'] = Array(layout.renderCols + 1).fill({ wch: 14 });
        const safeName = `${String(idx + 1).padStart(2, '0')}_${b.name}`.slice(0, 31);
        XLSX.utils.book_append_sheet(wb, sheet, safeName || `容器${idx + 1}`);
      });

      XLSX.writeFile(wb, `Cell_Storage_Export_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function exportJSON() {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], { type: 'application/json' }));
      a.download = `Cell_Storage_Backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }

    function triggerImport() { document.getElementById('import-file').click(); }

    function importJSON(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.boxes) return alert('文件格式错误，不是有效备份。');
          db = data;
          normalizeData();
          save();
          currentBoxId = null;
          selectedPositions.clear();
          renderFolderOptions();
          renderFolderList();
          renderBoxFolderStrip();
          renderBoxList();
          renderGrid();
          renderOverviewFolderStrip();
          updatePanel();
          updateWarningBoard();
          updateOverview();
          alert('导入成功！');
        } catch {
          alert('导入失败，文件可能已损坏。');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) document.getElementById('search-dd').style.display = 'none';
    });

    init();
  </script>
</body>
</html>

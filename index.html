    .view, .card { background: var(--card); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .view { flex: 1; padding: 16px; display: flex; justify-content: center; align-items: flex-start; overflow: auto; position: relative; }
    .grid { display: grid; gap: 6px; width: fit-content; margin: 0 auto; transform-origin: top center; transition: transform .15s ease; --grid-font-scale: 1; }
    .grid-zoom-controls { position: absolute; top: 16px; right: 16px; display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.96); border: 1px solid #e8e8e8; border-radius: 10px; padding: 6px 8px; z-index: 12; box-shadow: 0 2px 8px rgba(0,0,0,.08); cursor: grab; }
    .grid-zoom-controls.dragging { cursor: grabbing; }
    .zoom-drag-handle { color: #999; font-size: 14px; padding: 0 2px; user-select: none; }
    .zoom-label { font-size: 12px; color: #666; min-width: 46px; text-align: center; }
    .zoom-btn { border: 1px solid #d9d9d9; border-radius: 6px; background: #fff; width: 28px; height: 28px; line-height: 1; cursor: pointer; }
    .zoom-btn:hover { border-color: var(--primary); color: var(--primary); }
    .zoom-slider { width: 120px; accent-color: var(--primary); cursor: pointer; }
    .empty-tip { color: #999; margin-top: 40px; }

    .cell {
      width: 48px; height: 48px;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      font-size: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      cursor: pointer;
      transition: .2s;
    }
    .cell.occupied { border-color: transparent; font-weight: 600; color: #333; }
    .cell.occupied:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.12); cursor: grab; }
    .cell.occupied:active { cursor: grabbing; }
    .cell.selected { border: 2px solid var(--primary) !important; box-shadow: 0 0 0 3px rgba(24,144,255,.22); transform: scale(1.05); }
    .cell.drag-over { border: 2px dashed var(--primary); background: #e6f7ff !important; }
    .cell.highlight { animation: pulse 1s infinite alternate; border: 2px solid var(--warning) !important; }
    .cell-label {
      width: 100%;
      height: 100%;
      max-width: 100%;
      padding: 2px 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: normal;
      word-break: break-word;
      font-size: calc(11px * var(--grid-font-scale));
      line-height: 1.05;
      text-align: center;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
    }
    .cell.empty .cell-label {
      height: auto;
      white-space: nowrap;
      display: block;
      font-size: calc(9px * var(--grid-font-scale));
      color: #999;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 0 3px;
    }
    @keyframes pulse { from { transform: scale(1);} to { transform: scale(1.12);} }

    .panel { width: 340px; display: flex; flex-direction: column; gap: 12px; overflow: auto; }
    .card { padding: 16px; }
    .card h3 { margin: 0 0 10px; }
    .input { width: 100%; padding: 9px; margin: 4px 0 12px; border: 1px solid #d9d9d9; border-radius: 6px; }

  <script>
    const STORAGE_KEY = 'cell_storage_v1_2_db';
    const AUTO_BACKUP_KEY = 'cell_storage_v1_2_auto_backup_latest';
    const AUTO_BACKUP_LIST_KEY = 'cell_storage_v1_2_auto_backup_list';
    const AUTO_BACKUP_LIMIT = 10;
    const AUTO_BACKUP_DIR = 'auto-backups';
    const BACKUP_HANDLE_DB = 'cell_freezer_backup_handles';
    const BACKUP_HANDLE_STORE = 'handles';
    const AUTO_BACKUP_ENABLED_KEY = 'cell_freezer_auto_backup_enabled';
    const FIRST_LOAD_KEY = 'cell_freezer_first_load_done';
    const AUTO_BACKUP_AUTHORIZED_KEY = 'cell_freezer_auto_backup_authorized';
    const AUTO_BACKUP_MODE_KEY = 'cell_freezer_auto_backup_mode';
    const TOP_TOOLBAR_COLLAPSED_KEY = 'cell_freezer_top_toolbar_collapsed';
    const HEADER_SECTION_COLLAPSE_KEY = 'cell_freezer_header_section_collapse_state';
    const SIDEBAR_COLLAPSED_KEY = 'cell_freezer_sidebar_collapsed';

    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { folders: {}, boxes: {} };
    let currentBoxId = null;
    let currentFolderId = 'all';
    let selectedPositions = new Set();
    let searchHighlightPos = null;
    let draggedItemPos = null;
    let currentOverviewFolderId = 'all';
    let folderSearchKeyword = '';
    let boxSearchKeyword = '';
    let boxFilterMode = 'all';
    let folderSortMode = false;
    let folderLongPressTimer = null;
    let sidebarCollapsed = false;
    let collapsedNavExpandedFolders = new Set();
    let collapsedOverviewFolders = new Set();
    let collapsedOverviewBoxes = new Set();
    let gridZoom = 1;
    let zoomControlDragging = null;
    const savedEnabledState = localStorage.getItem(AUTO_BACKUP_ENABLED_KEY);
    if (savedEnabledState === null) localStorage.setItem(AUTO_BACKUP_ENABLED_KEY, '1');
    let autoBackupEnabled = (savedEnabledState ?? '1') !== '0';

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }


    function openBackupHandleDb() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(BACKUP_HANDLE_DB, 1);
        req.onupgradeneeded = () => {
          const dbi = req.result;
          if (!dbi.objectStoreNames.contains(BACKUP_HANDLE_STORE)) dbi.createObjectStore(BACKUP_HANDLE_STORE);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function saveDirectoryHandle(handle) {
      try {
        const dbi = await openBackupHandleDb();
        await new Promise((resolve, reject) => {
          const tx = dbi.transaction(BACKUP_HANDLE_STORE, 'readwrite');
          tx.objectStore(BACKUP_HANDLE_STORE).put(handle, 'autoBackupDirHandle');
          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });
        dbi.close();
      } catch (err) {
        console.warn('保存目录句柄失败:', err);
      }
    }

    async function loadDirectoryHandle() {
      try {
        const dbi = await openBackupHandleDb();
        const handle = await new Promise((resolve, reject) => {
          const tx = dbi.transaction(BACKUP_HANDLE_STORE, 'readonly');
          const req = tx.objectStore(BACKUP_HANDLE_STORE).get('autoBackupDirHandle');
          req.onsuccess = () => resolve(req.result || null);
          req.onerror = () => reject(req.error);
        });
        dbi.close();
        return handle;
      } catch (err) {
        console.warn('读取目录句柄失败:', err);
        return null;
      }
    }


    async function verifyPermission(handle, readWrite = true, request = false) {
      if (!handle) return false;
      const opts = { mode: readWrite ? 'readwrite' : 'read' };
      const q = await handle.queryPermission(opts);
      if (q === 'granted') return true;
      if (!request) return false;
      try {
        const r = await handle.requestPermission(opts);
        return r === 'granted';
      } catch {
        return false;
      }
    }


    async function clearDirectoryHandle() {
      try {
        const dbi = await openBackupHandleDb();
        await new Promise((resolve, reject) => {
          const tx = dbi.transaction(BACKUP_HANDLE_STORE, 'readwrite');
          tx.objectStore(BACKUP_HANDLE_STORE).delete('autoBackupDirHandle');
          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });
        dbi.close();
      } catch (err) {
        console.warn('清理目录句柄失败:', err);
      }
    }

    async function ensureWritableBackupDir(interactive = false, forcePick = false) {
      if (!('showDirectoryPicker' in window)) return null;
      let dirHandle = forcePick ? null : await loadDirectoryHandle();
      if (!dirHandle && interactive) {
        dirHandle = await window.showDirectoryPicker({ id: 'freezer-auto-backup-dir', mode: 'readwrite' });
        await saveDirectoryHandle(dirHandle);
      }
      if (!dirHandle) return null;

      const granted = await verifyPermission(dirHandle, true, interactive);
      if (!granted) return null;

      return await dirHandle.getDirectoryHandle(AUTO_BACKUP_DIR, { create: true });
    }

    async function writeBackupFileToFolder(fileName, content) {
      try {
        const backupDir = await ensureWritableBackupDir(false);
        if (!backupDir) return false;
        const fileHandle = await backupDir.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(content);
        await writable.close();
        return true;
      } catch (err) {
        console.warn('写入文件夹自动备份失败:', err);
        return false;
      }
    }

    function setBackupStatus(text, mode = 'local') {
      const targets = [document.getElementById('backup-status')].filter(Boolean);
      targets.forEach(el => {
        el.textContent = text;
        el.classList.remove('ok', 'off');
        if (mode === 'folder') el.classList.add('ok');
        if (mode === 'off') el.classList.add('off');
      });

      const dirLabel = document.getElementById('backup-dir-label');
      const dirTop = document.getElementById('backup-dir-top');
      const showDir = mode !== 'off';
      if (dirLabel) dirLabel.classList.toggle('hidden', !showDir);
      if (dirTop) {
        dirTop.classList.toggle('hidden', !showDir);
        if (showDir) {
          const fullPath = `${AUTO_BACKUP_DIR}/${getDailyBackupFileName()}`;
          dirTop.textContent = mode === 'folder' ? `${fullPath}（已授权）` : fullPath;
        }
      }

      const log = document.getElementById('last-backup-log');
      if (log && localStorage.getItem(AUTO_BACKUP_KEY)) {
        try {
          const latest = JSON.parse(localStorage.getItem(AUTO_BACKUP_KEY));
          if (latest?.savedAt) log.textContent = new Date(latest.savedAt).toLocaleTimeString('zh-CN', { hour12: false });
        } catch {}
      }
    }

    async function refreshBackupStatus() {
      const el = document.getElementById('backup-status');
      if (!el) return;
      if (!('showDirectoryPicker' in window)) {
        setBackupStatus('自动备份：浏览器不支持目录授权', 'local');
        return;
      }
      if (!autoBackupEnabled) {
        setBackupStatus('自动备份：已关闭', 'off');
        return;
      }
      const writable = await ensureWritableBackupDir(false);
      const everAuthorized = localStorage.getItem(AUTO_BACKUP_AUTHORIZED_KEY) === '1';
      const mode = writable ? 'folder' : 'local';
      localStorage.setItem(AUTO_BACKUP_MODE_KEY, mode);
      setBackupStatus(
        writable
          ? `自动备份：已授权`
          : (everAuthorized
            ? '自动备份：授权待恢复'
            : '自动备份：未授权目录'),
        mode
      );
    }

    async function enableFolderAutoBackup() {
      autoBackupEnabled = true;
      localStorage.setItem(AUTO_BACKUP_ENABLED_KEY, '1');
      if (!('showDirectoryPicker' in window)) {
        await refreshBackupStatus();
        return alert('当前浏览器不支持目录写入 API，将仅使用本地自动备份。');
      }
      try {
        await ensureWritableBackupDir(true);
        localStorage.setItem(AUTO_BACKUP_AUTHORIZED_KEY, '1');
        localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'folder');
        await refreshBackupStatus();
        saveAutoBackup('grant-folder-backup');
        alert('已启用自动备份。后续将自动写入 auto-backups 目录。');
      } catch (err) {
        console.warn(err);
        await refreshBackupStatus();
        alert('未完成授权，当前将仅使用本地自动备份。');
      }
    }

    async function changeBackupFolder() {
      if (!('showDirectoryPicker' in window)) return alert('当前浏览器不支持目录写入 API。');
      try {
        autoBackupEnabled = true;
        localStorage.setItem(AUTO_BACKUP_ENABLED_KEY, '1');
        await ensureWritableBackupDir(true, true);
        localStorage.setItem(AUTO_BACKUP_AUTHORIZED_KEY, '1');
        localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'folder');
        await refreshBackupStatus();
        saveAutoBackup('change-folder');
        alert('备份文件夹已更新。');
      } catch (err) {
        console.warn(err);
        alert('未完成文件夹更换。');
      }
    }

    async function disableAutoBackup() {
      autoBackupEnabled = false;
      localStorage.setItem(AUTO_BACKUP_ENABLED_KEY, '0');
      localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'off');
      localStorage.removeItem(AUTO_BACKUP_AUTHORIZED_KEY);
      await clearDirectoryHandle();
      await refreshBackupStatus();
      alert('自动备份已关闭。');
    }




    async function restoreBackupPermissionOnLoad() {
      if (!autoBackupEnabled || !('showDirectoryPicker' in window)) return false;
      try {
        // 仅做静默恢复，不在页面加载时弹权限框（按需只在“启用/更改文件夹”时请求）
        const handle = await loadDirectoryHandle();
        if (!handle) {
          localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'local');
          return false;
        }
        const granted = await verifyPermission(handle, true, false);
        if (!granted) {
          localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'local');
          return false;
        }
        const writableDir = await ensureWritableBackupDir(false);
        if (!writableDir) {
          localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'local');
          return false;
        }
        localStorage.setItem(AUTO_BACKUP_AUTHORIZED_KEY, '1');
        localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'folder');
        return true;
      } catch (err) {
        console.warn('恢复备份目录权限失败:', err);
        localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'local');
        return false;
      }
    }

    function getDailyBackupFileName(date = new Date()) {
      return `backup_${date.toISOString().slice(0, 10)}.json`;
    }

    function upsertDailyBackupRecord(folder, filePayload) {
      folder.files = folder.files || [];
      const idx = folder.files.findIndex(f => f.name === filePayload.name);
      if (idx >= 0) folder.files[idx] = filePayload;
      else folder.files.unshift(filePayload);
      folder.files = folder.files
        .sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''))
        .slice(0, AUTO_BACKUP_LIMIT);
      return folder;
    }

    function coerceBackupData(raw) {
      if (!raw || typeof raw !== 'object') return null;
      const source = (raw.data && typeof raw.data === 'object') ? raw.data : raw;

      const folderMap = {};
      const addFolder = (id, name, parentId = null) => {
        const fid = String(id || '').trim();
        if (!fid) return null;
        if (!folderMap[fid]) folderMap[fid] = { name: String(name || fid), parentId: parentId || null };
        else {
          if (name) folderMap[fid].name = String(name);
          if (parentId !== undefined && parentId !== null) folderMap[fid].parentId = parentId;
        }
        return fid;
      };

      const srcFolders = source.folders || source.locations || source.folderMap;
      if (Array.isArray(srcFolders)) {
        srcFolders.forEach((f, idx) => {
          if (typeof f === 'string') { addFolder(`folder_${idx + 1}`, f, null); return; }
          if (!f || typeof f !== 'object') return;
          addFolder(f.id || f.folderId || f.key || `folder_${idx + 1}`, f.name || f.title || `位置${idx + 1}`, f.parentId || f.parent || null);
        });
      } else if (srcFolders && typeof srcFolders === 'object') {
        Object.keys(srcFolders).forEach(fid => {
          const f = srcFolders[fid];
          if (typeof f === 'string') addFolder(fid, f, null);
          else if (f && typeof f === 'object') addFolder(fid, f.name || f.title || fid, f.parentId || f.parent || null);
        });
      }

      const rawBoxes = source.boxes || source.containers || source.freezers;
      if (!rawBoxes) return null;
      const boxPairs = Array.isArray(rawBoxes)
        ? rawBoxes.map((b, i) => [b?.id || b?.boxId || b?.key || `box_${Date.now()}_${i}`, b])
        : Object.entries(rawBoxes);

      const boxes = {};
      boxPairs.forEach(([id, b], idx) => {
        if (!b || typeof b !== 'object') return;
        const folderId = b.folderId || b.locationId || b.folder || b.location || 'default';
        if (!folderMap[folderId]) addFolder(folderId, String(folderId), null);

        let vials = b.vials || b.cells || b.samples || {};
        if (Array.isArray(vials)) {
          const mapped = {};
          vials.forEach((item, i) => {
            if (!item || typeof item !== 'object') return;
            const pos = item.pos || item.position || item.key || `${Math.floor(i / 12) + 1}-${(i % 12) + 1}`;
            mapped[pos] = {
              name: item.name || item.cellName || '',
              p: item.p || item.passage || '',
              date: item.date || item.freezeDate || ''
            };
          });
          vials = mapped;
        }

        boxes[String(id || `box_${idx + 1}`)] = {
          name: b.name || b.title || `容器${idx + 1}`,
          rows: Number(b.rows || b.r || b.height || 8) || 8,
          cols: Number(b.cols || b.c || b.width || 12) || 12,
          folderId,
          vials: (vials && typeof vials === 'object') ? vials : {}
        };
      });

      if (!Object.keys(folderMap).length) folderMap.default = { name: '默认位置', parentId: null };
      if (!folderMap.default) folderMap.default = { name: '默认位置', parentId: null };
      return { folders: folderMap, boxes };
    }

    function loadLatestBackupDataFromLocal() {
      try {
        const folder = JSON.parse(localStorage.getItem(AUTO_BACKUP_LIST_KEY) || '{"dir":"auto-backups","files":[]}');
        const files = (folder.files || []).slice().sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''));
        const latest = files[0];
        if (!latest || !latest.content) return null;
        const data = JSON.parse(latest.content);
        return coerceBackupData(data);
      } catch (err) {
        console.warn('读取最新备份失败:', err);
        return null;
      }
    }

    function saveAutoBackup(reason = 'manual') {
      if (!autoBackupEnabled) return;
      try {
        const savedAt = new Date().toISOString();
        const fileName = getDailyBackupFileName(new Date(savedAt));
        const jsonContent = JSON.stringify(db, null, 2);

        const filePayload = {
          dir: AUTO_BACKUP_DIR,
          name: fileName,
          reason,
          savedAt,
          content: jsonContent
        };
        localStorage.setItem(AUTO_BACKUP_KEY, JSON.stringify(filePayload));

        const folder = JSON.parse(localStorage.getItem(AUTO_BACKUP_LIST_KEY) || '{"dir":"auto-backups","files":[]}');
        folder.dir = AUTO_BACKUP_DIR;
        upsertDailyBackupRecord(folder, filePayload);
        localStorage.setItem(AUTO_BACKUP_LIST_KEY, JSON.stringify(folder));

        // 文件夹写入为增强能力；即使失败也持续进行本地自动备份（无需手动再次启用）
        writeBackupFileToFolder(fileName, jsonContent)
          .then(ok => localStorage.setItem(AUTO_BACKUP_MODE_KEY, ok ? 'folder' : 'local'))
          .catch(() => localStorage.setItem(AUTO_BACKUP_MODE_KEY, 'local'));
      } catch (err) {
        console.warn('自动备份失败:', err);
      }
    }

    function normalizeData() {
      let changed = false;
      if (!db.folders || typeof db.folders !== 'object') { db.folders = {}; changed = true; }
      if (!db.boxes || typeof db.boxes !== 'object') { db.boxes = {}; changed = true; }
      if (!Object.keys(db.folders).length) { db.folders.default = { name: '默认位置', parentId: null }; changed = true; }

      Object.keys(db.folders).forEach(fid => {
        const f = db.folders[fid] || {};
        if (!f.name) { f.name = fid; changed = true; }
        if (!Object.prototype.hasOwnProperty.call(f, 'parentId')) { f.parentId = null; changed = true; }
        if (f.parentId === fid || (f.parentId && !db.folders[f.parentId])) { f.parentId = null; changed = true; }
        db.folders[fid] = f;
      });
      if (db.folders.default && db.folders.default.parentId !== null) { db.folders.default.parentId = null; changed = true; }

      Object.values(db.boxes).forEach(box => {
        if (box.size && !box.rows) { box.rows = box.size; box.cols = box.size; changed = true; }
        if (!box.rows) { box.rows = 8; changed = true; }
        if (!box.cols) { box.cols = 12; changed = true; }
        if (!box.vials) { box.vials = {}; changed = true; }
        if (!box.folderId || !db.folders[box.folderId]) { box.folderId = 'default'; changed = true; }
      });

      if (changed) save();
    }

    function getFolderChildrenMap() {
      const map = {};
      Object.keys(db.folders).forEach(fid => {
        const parentId = db.folders[fid]?.parentId || null;
        if (!map[parentId]) map[parentId] = [];
        map[parentId].push(fid);
      });
      return map;
    }

    function getOrderedFolderIds() {
      const map = getFolderChildrenMap();
      const ordered = [];
      const visited = new Set();
      const walk = (parentId) => {
        (map[parentId] || []).forEach(fid => {
          if (visited.has(fid)) return;
          visited.add(fid);
          ordered.push(fid);
          walk(fid);
        });
      };
      walk(null);
      Object.keys(db.folders).forEach(fid => { if (!visited.has(fid)) ordered.push(fid); });
      return ordered;
    }

    function getFolderDepth(folderId) {
      let depth = 0;
      let cur = db.folders[folderId]?.parentId || null;
      const guard = new Set([folderId]);
      while (cur && db.folders[cur] && !guard.has(cur)) {
        guard.add(cur);
        depth += 1;
        cur = db.folders[cur]?.parentId || null;
      }
      return depth;
    }

    function getDescendantFolderIds(folderId) {
      const map = getFolderChildrenMap();
      const out = [];
      const walk = (fid) => {
        out.push(fid);
        (map[fid] || []).forEach(walk);
      };
      walk(folderId);
      return out;
    }

    function getFolderPathName(folderId) {
      const names = [];
      let cur = folderId;
      const guard = new Set();
      while (cur && db.folders[cur] && !guard.has(cur)) {
        guard.add(cur);
        names.unshift(db.folders[cur].name || cur);
        cur = db.folders[cur].parentId || null;
      }
      return names.join(' / ');
    }

    function getFolderColor(folderId) {
      const palette = ['#1677ff', '#13c2c2', '#722ed1', '#eb2f96', '#fa8c16', '#52c41a', '#2f54eb', '#f5222d'];
      if (!folderId || folderId === 'all') return '#69c0ff';
      let hash = 0;
      for (let i = 0; i < folderId.length; i++) hash = folderId.charCodeAt(i) + ((hash << 5) - hash);
      return palette[Math.abs(hash) % palette.length];
    }

    function expandFolderAncestors(folderId) {
      let cur = db.folders[folderId]?.parentId || null;
      const guard = new Set([folderId]);
      while (cur && db.folders[cur] && !guard.has(cur)) {
        guard.add(cur);
        collapsedNavExpandedFolders.add(cur);
        cur = db.folders[cur].parentId || null;
      }
    }

    function moveFolderOrder(folderId, delta, e) {
      if (e) e.stopPropagation();
      const movable = Object.keys(db.folders).filter(id => id !== 'default');
      const idx = movable.indexOf(folderId);
      const target = idx + delta;
      if (idx < 0 || target < 0 || target >= movable.length) return;
      const swapped = movable.slice();
      [swapped[idx], swapped[target]] = [swapped[target], swapped[idx]];

      const entries = [];
      if (db.folders.default) entries.push(['default', db.folders.default]);
      swapped.forEach(id => entries.push([id, db.folders[id]]));
      db.folders = Object.fromEntries(entries);
      save();
      renderFolderList();
      renderBoxList();
      renderCollapsedNav();
      renderOverviewFolderStrip();
      updateOverview();
    }

      }));
      return new Set(Object.keys(counts).filter(name => counts[name] <= 3));

    function deleteFolder(id, e) {
      e.stopPropagation();
      if (id === 'default') return alert('默认位置不可删除。');
      const related = Object.values(db.boxes).filter(b => b.folderId === id).length;
      if (related > 0) {
        const target = prompt(`该文件夹下有 ${related} 个容器。
请输入要迁移到的目标文件夹名称（留空取消）：`, db.folders.default?.name || '默认位置');
        if (!target) return;
        const targetId = Object.keys(db.folders).find(fid => db.folders[fid].name === target.trim());
        if (!targetId) return alert('未找到目标文件夹名称，请重试。');
        if (targetId === id) return alert('目标文件夹不能和待删除文件夹相同。');
        Object.values(db.boxes).forEach(box => {
          if (box.folderId === id) box.folderId = targetId;
        });
      }
      if (!confirm(`确定删除文件夹【${db.folders[id].name}】吗？`)) return;
      const fallbackParent = db.folders[id]?.parentId || null;
      Object.keys(db.folders).forEach(fid => { if (db.folders[fid].parentId === id) db.folders[fid].parentId = fallbackParent; });
      delete db.folders[id];
      if (currentFolderId === id) currentFolderId = 'all';
      save();
      renderFolderOptions();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function renderFolderOptions() {
      const ordered = getOrderedFolderIds();
      const options = ordered.map(id => {
        const depth = getFolderDepth(id);
        const prefix = '　'.repeat(depth);
        return `<option value="${id}">位置: ${prefix}${db.folders[id].name}</option>`;
      }).join('');
      const sel = document.getElementById('new-box-folder');
      if (sel) sel.innerHTML = options;
      const modalSel = document.getElementById('add-box-folder');
      if (modalSel) modalSel.innerHTML = options;

      const parentSel = document.getElementById('add-folder-parent');
      if (parentSel) {
        const parentOptions = ['<option value="root">(根目录)</option>', ...ordered.map(id => {
          const depth = getFolderDepth(id);
          const prefix = '　'.repeat(depth);
          return `<option value="${id}">${prefix}${db.folders[id].name}</option>`;
        })];
        parentSel.innerHTML = parentOptions.join('');
      }
    }

    function renderFolderList() {
      const list = document.getElementById('folder-list');
      list.innerHTML = '';

      if (folderSortMode) {
        const tip = document.createElement('div');
        tip.className = 'muted';
        tip.style.marginBottom = '6px';
        tip.innerHTML = '排序模式：使用 ↑↓ 调整顺序，完成后点击 <button class="mini-btn" onclick="finishFolderSortMode(event)">完成</button>';
        list.appendChild(tip);
      }

      const totalBoxes = Object.keys(db.boxes).length;
      const allItem = document.createElement('div');
      allItem.className = `item tree-item ${currentFolderId === 'all' ? 'active' : ''}`;
      allItem.innerHTML = `<div class="item-info"><span class="tree-arrow">▾</span>全部位置</div><div class="item-tag">${totalBoxes}</div>`;
      allItem.onclick = () => setFolderFilter('all');
      list.appendChild(allItem);

      const childrenMap = getFolderChildrenMap();
      const key = folderSearchKeyword.trim().toLowerCase();
      const lowNames = getLowInventoryNames();
      const visibleFolders = new Set();
      const visibleBoxesByFolder = {};

      Object.keys(db.boxes).forEach(bid => {
        const b = db.boxes[bid];
        if (!b) return;
        if (boxFilterMode === 'low') {
          const hasLow = Object.values(b.vials || {}).some(v => v?.name && lowNames.has(v.name));
          if (!hasLow) return;
        }
        if (boxSearchKeyword && !(b.name || '').toLowerCase().includes(boxSearchKeyword)) return;
        const fid = b.folderId || 'default';
        if (!visibleBoxesByFolder[fid]) visibleBoxesByFolder[fid] = [];
        visibleBoxesByFolder[fid].push(bid);
      });

      const markVisibleWithAncestors = (fid) => {
        let cur = fid;
        const guard = new Set();
        while (cur && db.folders[cur] && !guard.has(cur)) {
          visibleFolders.add(cur);
          collapsedNavExpandedFolders.add(cur);
          guard.add(cur);
          cur = db.folders[cur].parentId || null;
        }
      };

      if (key) {
        getOrderedFolderIds().forEach(fid => {
          const name = (db.folders[fid]?.name || '').toLowerCase();
          const path = getFolderPathName(fid).toLowerCase();
          if (name.includes(key) || path.includes(key)) markVisibleWithAncestors(fid);
        });
        Object.keys(visibleBoxesByFolder).forEach(fid => {
          const matchedBoxes = visibleBoxesByFolder[fid].filter(bid => (db.boxes[bid]?.name || '').toLowerCase().includes(key));
          if (matchedBoxes.length) {
            visibleBoxesByFolder[fid] = matchedBoxes;
            markVisibleWithAncestors(fid);
          } else {
            delete visibleBoxesByFolder[fid];
          }
        });
      }

      const renderNode = (fid, depth) => {
        if (key && !visibleFolders.has(fid)) return;
        const folder = db.folders[fid];
        const descendants = new Set(getDescendantFolderIds(fid));
        const count = Object.values(db.boxes).filter(b => descendants.has(b.folderId)).length;
        const childIds = (childrenMap[fid] || []).filter(cid => !key || visibleFolders.has(cid));
        const folderBoxIds = (visibleBoxesByFolder[fid] || []).slice().sort((a, b) => (db.boxes[a]?.name || '').localeCompare(db.boxes[b]?.name || '', 'zh-CN'));
        const expanded = collapsedNavExpandedFolders.has(fid) || !!key;
        const expandable = childIds.length > 0 || folderBoxIds.length > 0;

        const div = document.createElement('div');
        div.className = `item folder-item tree-item ${currentFolderId === fid ? 'active' : ''}`;
        div.style.borderLeftColor = getFolderColor(fid);
        const sortOps = folderSortMode && fid !== 'default'
          ? `<span class="folder-sort-ops"><button class="mini-btn" onclick="moveFolderOrder('${fid}',-1,event)">↑</button><button class="mini-btn" onclick="moveFolderOrder('${fid}',1,event)">↓</button></span>`
          : '';
        const arrow = expandable ? (expanded ? '▾' : '▸') : '•';
        const arrowClick = expandable ? `onclick="toggleFolderTreeExpand('${fid}',event)"` : '';
        div.innerHTML = `
          <div class="item-info" style="padding-left:${depth * 14}px">
            <span class="tree-arrow tree-arrow-btn" ${arrowClick}>${arrow}</span>${folder.name}<span class="item-tag">${count}</span>${sortOps}
          </div>
          <div>
            <button class="mini-btn" title="重命名" onclick="renameFolder('${fid}',event)">✎</button>
            <button class="mini-btn danger" title="删除" onclick="deleteFolder('${fid}',event)">🗑</button>
          </div>
        `;
        div.onpointerdown = () => startFolderLongPress(fid);
        div.onpointerup = cancelFolderLongPress;
        div.onpointerleave = cancelFolderLongPress;
        div.onclick = () => handleFolderTreeItemClick(fid, expandable);
        list.appendChild(div);

        if (!expanded) return;
        childIds.forEach(cid => renderNode(cid, depth + 1));

        folderBoxIds.forEach(bid => {
          const b = db.boxes[bid];
          if (!b) return;
          const boxDiv = document.createElement('div');
          boxDiv.className = `item tree-item ${currentBoxId === bid ? 'active' : ''}`;
          boxDiv.style.borderLeftColor = getFolderColor(fid);
          boxDiv.innerHTML = `<div class="item-info" style="padding-left:${(depth + 1) * 14}px"><span class="tree-arrow">▸</span>${b.name}<span class="item-tag">${b.rows}x${b.cols}</span></div>`;
          boxDiv.onclick = () => { searchHighlightPos = null; switchBox(bid); };
          list.appendChild(boxDiv);
        });
      };

      (childrenMap[null] || []).forEach(fid => renderNode(fid, 0));
    }

    function renderBoxFolderStrip() {
      const strip = document.getElementById('box-folder-strip');
      if (!strip) return;
      const folderIds = getOrderedFolderIds();
      const total = Object.keys(db.boxes).length;
      strip.innerHTML = [
        `<div class="folder-chip all ${currentFolderId === 'all' ? 'active' : ''}" onclick="setFolderFilter('all')">全部 · ${total}</div>`,
        ...folderIds.map(fid => {
          const descendants = new Set(getDescendantFolderIds(fid));
          const count = Object.values(db.boxes).filter(b => descendants.has(b.folderId)).length;
          return `<div class="folder-chip ${currentFolderId === fid ? 'active' : ''}" style="color:${getFolderColor(fid)}" onclick="setFolderFilter('${fid}')">${getFolderPathName(fid)} · ${count}</div>`;
        })
      ].join('');
    }

    function addBox() {
      renderFolderOptions();
      const mask = document.getElementById('add-box-modal-mask');
      const name = document.getElementById('add-box-name');
      const spec = document.getElementById('add-box-spec');
      if (name) name.value = '';
      if (spec) spec.value = '8,12';
      if (mask) mask.classList.remove('hidden');
      setTimeout(() => name?.focus(), 30);
    }

    function closeAddBoxModal(e) {
      if (e && e.target && e.target.id !== 'add-box-modal-mask') return;
      const mask = document.getElementById('add-box-modal-mask');
      if (mask) mask.classList.add('hidden');
    }

    function submitAddBoxModal() {
      const name = (document.getElementById('add-box-name')?.value || '').trim();
      if (!name) return alert('请输入容器名称。');
      const folderId = document.getElementById('add-box-folder')?.value;
      const [rows, cols] = (document.getElementById('add-box-spec')?.value || '8,12').split(',').map(Number);
      if (!folderId || !db.folders[folderId]) return alert('请选择有效位置文件夹。');

      const id = 'box_' + Date.now();
      db.boxes[id] = { name, rows, cols, folderId, vials: {} };
      save();
      closeAddBoxModal();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      switchBox(id);
      renderOverviewFolderStrip();
      updateOverview();
    }

    function moveBoxFolder(id, e) {
      e.stopPropagation();
      const box = db.boxes[id];
      if (!box) return;
      const options = Object.keys(db.folders)
        .map((fid, idx) => `${idx + 1}. ${db.folders[fid].name}${fid === box.folderId ? '（当前）' : ''}`)
        .join('\n');
      const input = prompt(`请选择目标文件夹序号：
${options}`);
      if (!input) return;
      const n = Number(input);
      const folderIds = Object.keys(db.folders);
      if (!Number.isInteger(n) || n < 1 || n > folderIds.length) return alert('输入序号无效。');
      const targetId = folderIds[n - 1];
      if (targetId === box.folderId) return;
      box.folderId = targetId;
      save();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function deleteBox(id, e) {
      e.stopPropagation();
      if (!confirm(`确定删除容器【${db.boxes[id].name}】及其内所有样本吗？`)) return;
      delete db.boxes[id];
      if (currentBoxId === id) {
        currentBoxId = null;
        document.getElementById('grid').innerHTML = '';
        document.getElementById('empty-tip').style.display = 'block';
      }
      selectedPositions.clear();
      save();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      renderCollapsedNav();
      updatePanel();
      updateWarningBoard();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function renderBoxList() {
      const list = document.getElementById('box-list');
      if (!list) return;
      list.innerHTML = '';
      renderBoxFilters();
      const lowNames = getLowInventoryNames();
      const ids = Object.keys(db.boxes).filter(id => {
        const b = db.boxes[id];
        if (boxSearchKeyword && !(b.name || '').toLowerCase().includes(boxSearchKeyword)) return false;
        if (boxFilterMode === 'low') return Object.values(b.vials || {}).some(v => v?.name && lowNames.has(v.name));
        return true;
      });

      const renderBoxItem = (id) => {
        const b = db.boxes[id];
        const folderName = db.folders[b.folderId]?.name || '未分类';
        const div = document.createElement('div');
        div.className = `item tree-item ${id === currentBoxId ? 'active' : ''}`;
        div.style.borderLeftColor = getFolderColor(b.folderId);
        div.innerHTML = `
          <div class="item-info"><span class="tree-arrow">▸</span>${b.name}<span class="item-tag">${b.rows}x${b.cols}</span>${currentFolderId === 'all' ? `<span class="item-tag">${folderName}</span>` : ''}</div>
          <div>
            <button class="mini-btn" title="移动到其他文件夹" onclick="moveBoxFolder('${id}',event)">📁</button>
            <button class="mini-btn danger" title="删除容器" onclick="deleteBox('${id}',event)">✕</button>
          </div>
        `;
        div.onclick = () => { searchHighlightPos = null; switchBox(id); };
        list.appendChild(div);
      };

      if (currentFolderId !== 'all') {
        const allowed = new Set(getDescendantFolderIds(currentFolderId));
        ids.filter(id => allowed.has(db.boxes[id].folderId)).forEach(renderBoxItem);
        return;
      }

      const grouped = {};
      ids.forEach(id => {
        const fid = db.boxes[id].folderId || 'default';
        if (!grouped[fid]) grouped[fid] = [];
        grouped[fid].push(id);
      });

      getOrderedFolderIds().forEach(fid => {
        const folderIds = grouped[fid] || [];
        if (!folderIds.length) return;
        const title = document.createElement('div');
        title.className = 'box-group-title';
        title.style.background = getFolderColor(fid);
        title.innerHTML = `<span>${getFolderPathName(fid)}</span><span>${folderIds.length}</span>`;
        list.appendChild(title);
        folderIds.forEach(renderBoxItem);
      });
      renderCollapsedNav();
    }

    function switchBox(id) {
      currentBoxId = id;
      selectedPositions.clear();
      document.getElementById('empty-tip').style.display = 'none';
      renderGrid();
      renderBoxList();
      updatePanel();
    }


    function getDisplayLayout(box) {
      // 12x6 规格按横向展示：6行x12列（仅改变可视化，不改存储坐标）
      if (box.rows === 12 && box.cols === 6) {
        return {
          renderRows: 6,
          renderCols: 12,
          toPos: (r, c) => `${c}-${r}`
        };
      }
      return {
        renderRows: box.rows,
        renderCols: box.cols,
        toPos: (r, c) => `${r}-${c}`
      };
    }

    function updateGridZoom() {
      const grid = document.getElementById('grid');
      const label = document.getElementById('grid-zoom-label');
      const slider = document.getElementById('grid-zoom-slider');
      if (grid) {
        grid.style.transform = `scale(${gridZoom})`;
        grid.style.setProperty('--grid-font-scale', `${(1 / gridZoom).toFixed(4)}`);
      }
      if (label) label.textContent = `${Math.round(gridZoom * 100)}%`;
      if (slider) slider.value = String(Math.round(gridZoom * 100));
    }

    function setGridZoom(next) {
      gridZoom = Math.max(0.6, Math.min(1.8, Number(next.toFixed(2))));
      updateGridZoom();
    }

    function handleGridZoomSlider(value) {
      const pct = Number(value);
      if (Number.isNaN(pct)) return;
      setGridZoom(pct / 100);
    }

    function zoomGridIn() { setGridZoom(gridZoom + 0.1); }
    function zoomGridOut() { setGridZoom(gridZoom - 0.1); }
    function resetGridZoom() { setGridZoom(1); }

    function initGridZoomControls() {
      const controls = document.getElementById('grid-zoom-controls');
      const view = document.querySelector('#grid-view .view');
      if (!controls || !view || controls.dataset.dragReady === '1') return;
      controls.dataset.dragReady = '1';

      controls.addEventListener('mousedown', (e) => {
        if (e.target.closest('button, input')) return;
        const viewRect = view.getBoundingClientRect();
        const ctrlRect = controls.getBoundingClientRect();
        zoomControlDragging = {
          offsetX: e.clientX - ctrlRect.left,
          offsetY: e.clientY - ctrlRect.top,
          viewRect
        };
        controls.classList.add('dragging');
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!zoomControlDragging) return;
        const { offsetX, offsetY, viewRect } = zoomControlDragging;
        const left = Math.min(Math.max(e.clientX - viewRect.left - offsetX, 0), Math.max(viewRect.width - controls.offsetWidth, 0));
        const top = Math.min(Math.max(e.clientY - viewRect.top - offsetY, 0), Math.max(viewRect.height - controls.offsetHeight, 0));
        controls.style.left = `${left}px`;
        controls.style.top = `${top}px`;
        controls.style.right = 'auto';
      });

      document.addEventListener('mouseup', () => {
        if (!zoomControlDragging) return;
        zoomControlDragging = null;
        controls.classList.remove('dragging');
      });
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      if (!currentBoxId || !db.boxes[currentBoxId]) return;

      const box = db.boxes[currentBoxId];
      const layout = getDisplayLayout(box);
      grid.style.gridTemplateColumns = `repeat(${layout.renderCols}, 48px)`;
      updateGridZoom();

      for (let r = 1; r <= layout.renderRows; r++) {
        for (let c = 1; c <= layout.renderCols; c++) {
          const pos = layout.toPos(r, c);
          const vial = box.vials[pos];
          const el = document.createElement('div');
          el.className = 'cell';
          el.id = `cell-${pos}`;

          if (vial && vial.name) {
            el.classList.add('occupied');
            el.style.backgroundColor = stringToHslColor(vial.name);
            el.title = `位置: ${pos}\n名称: ${vial.name}\n代数: ${vial.p || '-'}\n日期: ${vial.date || '-'}`;
            el.innerHTML = `<div class="cell-label">${vial.name}</div>`;
            el.setAttribute('draggable', 'true');
            el.addEventListener('dragstart', (e) => handleDragStart(e, pos));
            el.addEventListener('dragend', handleDragEnd);
          } else {
            el.classList.add('empty');
            el.innerHTML = `<div class="cell-label">${pos}</div>`;
            el.addEventListener('dragover', handleDragOver);
            el.addEventListener('dragenter', function(){ this.classList.add('drag-over'); });
            el.addEventListener('dragleave', function(){ this.classList.remove('drag-over'); });
            el.addEventListener('drop', (e) => handleDrop(e, pos));
          }

          if (selectedPositions.has(pos)) el.classList.add('selected');
          if (searchHighlightPos === pos) el.classList.add('highlight');
          el.addEventListener('click', () => { searchHighlightPos = null; toggleSelect(pos); });
          grid.appendChild(el);
        }
      }
    }

    function stringToHslColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return `hsl(${Math.abs(hash) % 360}, 60%, 88%)`;
    }

    function handleDragStart(e, pos) {
      draggedItemPos = pos;
      e.dataTransfer.effectAllowed = 'move';
      e.target.style.opacity = '.5';
    }
    function handleDragEnd(e) {
      e.target.style.opacity = '1';
      document.querySelectorAll('.cell').forEach(el => el.classList.remove('drag-over'));
    }
    function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function handleDrop(e, targetPos) {
      e.stopPropagation();
      const box = db.boxes[currentBoxId];
      if (!box || !draggedItemPos || draggedItemPos === targetPos) return;
      if (box.vials[targetPos]) return alert('目标位置已有样本，请先清空目标位置。');
      box.vials[targetPos] = box.vials[draggedItemPos];
      delete box.vials[draggedItemPos];
      save();
      renderGrid();
      updateOverview();
    }

    function toggleSelect(pos) {
      if (selectedPositions.has(pos)) selectedPositions.delete(pos); else selectedPositions.add(pos);
      renderGrid();
      updatePanel();
    }

    function updatePanel() {
      document.getElementById('sel-count').textContent = selectedPositions.size;
      if (selectedPositions.size === 1 && currentBoxId) {
        const pos = [...selectedPositions][0];
        const data = db.boxes[currentBoxId].vials[pos] || {};
        document.getElementById('cell-name').value = data.name || '';
        document.getElementById('cell-p').value = data.p || '';
        document.getElementById('cell-date').value = data.date || '';
      }
      updateLiveStats();
    }

    function updateLiveStats() {
      const key = document.getElementById('cell-name').value.trim().toLowerCase();
      const total = document.getElementById('total-inv');
      const stats = document.getElementById('stats');
      if (!key) { total.textContent = '0'; stats.classList.remove('low'); return; }
      let cnt = 0;
      Object.values(db.boxes).forEach(b => Object.values(b.vials).forEach(v => {
        if (v.name && v.name.toLowerCase() === key) cnt++;
      }));
      total.textContent = cnt;
      if (cnt > 0 && cnt <= 3) stats.classList.add('low'); else stats.classList.remove('low');
    }

    function saveBatch() {
      if (!currentBoxId || !selectedPositions.size) return alert('请先选择格子。');
      const name = document.getElementById('cell-name').value.trim();
      if (!name) return alert('细胞名称必填。');

      const payload = {
        name,
        p: document.getElementById('cell-p').value.trim(),
        date: document.getElementById('cell-date').value
      };
      selectedPositions.forEach(pos => { db.boxes[currentBoxId].vials[pos] = { ...payload }; });
      selectedPositions.clear();
      save();
      renderGrid();
      updatePanel();
      updateWarningBoard();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function clearBatch() {
      if (!selectedPositions.size) return;
      if (!confirm('确定清空所选位置吗？')) return;
      selectedPositions.forEach(pos => delete db.boxes[currentBoxId].vials[pos]);
      selectedPositions.clear();
      save();
      renderGrid();
      updatePanel();
      updateWarningBoard();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function handleGlobalSearch() {
      const term = document.getElementById('global-search').value.trim().toLowerCase();
      const dd = document.getElementById('search-dd');
      if (!term) { dd.style.display = 'none'; return; }

      const rows = [];
      Object.keys(db.boxes).forEach(boxId => {
        const box = db.boxes[boxId];
        Object.keys(box.vials).forEach(pos => {
          const v = box.vials[pos];
          const n = (v.name || '').toLowerCase();
          const p = (v.p || '').toLowerCase();
          if (n.includes(term) || p.includes(term)) {
            rows.push({ boxId, pos, name: v.name || '-', p: v.p || '-', boxName: box.name, folderName: db.folders[box.folderId]?.name || '-' });
          }
        });
      });

      dd.innerHTML = rows.length
        ? rows.map(r => `
          <div class="search-item" onclick="jumpTo('${r.boxId}','${r.pos}')">
            <div><b>${r.name}</b> <span class="muted">(${r.p})</span></div>
            <div class="loc-tag">${r.folderName}/${r.boxName} [${r.pos}]</div>
          </div>
        `).join('')
        : '<div style="padding:12px;color:#999">未找到匹配样本</div>';
      dd.style.display = 'block';
    }

    function jumpTo(boxId, pos) {
      document.getElementById('search-dd').style.display = 'none';
      document.getElementById('global-search').value = '';
      currentFolderId = db.boxes[boxId].folderId || 'all';
      renderFolderList();
      renderBoxFolderStrip();
      searchHighlightPos = pos;
      switchBox(boxId);
      setTimeout(() => {
        const el = document.getElementById(`cell-${pos}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 150);
    }

    function updateWarningBoard() {
      const w = document.getElementById('warn-list');
      const counts = {};
      Object.values(db.boxes).forEach(b => Object.values(b.vials).forEach(v => {
        if (v.name) counts[v.name] = (counts[v.name] || 0) + 1;
      }));
      const lows = Object.keys(counts).filter(name => counts[name] <= 3);
      w.innerHTML = lows.length
        ? lows.map(name => `<div style="padding:8px;display:flex;justify-content:space-between;border-bottom:1px solid #f0f0f0"><span>${name}</span><b style="color:var(--danger)">余${counts[name]}</b></div>`).join('')
        : '<div style="color:#bfbfbf;text-align:center;">✅ 库存充足</div>';
    }

    function switchView(view) {
      document.getElementById('grid-view').style.display = view === 'grid' ? 'flex' : 'none';
      document.getElementById('overview-view').style.display = view === 'overview' ? 'block' : 'none';
      if (view === 'overview') { renderOverviewFolderStrip(); updateOverview(); }
    }


    function toggleOverviewFolder(folderId) {
      if (collapsedOverviewFolders.has(folderId)) collapsedOverviewFolders.delete(folderId);
      else collapsedOverviewFolders.add(folderId);
      updateOverview();
    }

    function toggleOverviewBox(boxId) {
      if (collapsedOverviewBoxes.has(boxId)) collapsedOverviewBoxes.delete(boxId);
      else collapsedOverviewBoxes.add(boxId);
      updateOverview();
    }

    function handleOverviewWheel(e) {
      const el = document.getElementById('overview-scroll');
      if (!el) return;
      el.scrollTop += e.deltaY;
    }

    function updateOverview() {
      const tree = document.getElementById('overview-tree');
      const folderIds = currentOverviewFolderId === 'all' ? getOrderedFolderIds() : getDescendantFolderIds(currentOverviewFolderId).filter(fid => db.folders[fid]);
      const chunks = [];

      folderIds.forEach(fid => {
        const folder = db.folders[fid];
        const boxes = Object.keys(db.boxes)
          .filter(boxId => db.boxes[boxId].folderId === fid)
          .sort((a, b) => (db.boxes[a].name || '').localeCompare(db.boxes[b].name || '', 'zh-CN'));

        const folderTotal = boxes.reduce((sum, boxId) => {
          const b = db.boxes[boxId];
          return sum + Object.values(b.vials || {}).filter(v => v && v.name).length;
        }, 0);

        const folderCollapsed = collapsedOverviewFolders.has(fid);
        let folderBody = '<div class="ov-folder-body">';

        if (!boxes.length) {
          folderBody += '<div class="ov-empty">该文件夹暂无容器</div>';
        } else {
          boxes.forEach(boxId => {
            const b = db.boxes[boxId];
            const counts = {};
            Object.values(b.vials || {}).forEach(v => {
              if (!v || !v.name) return;
              counts[v.name] = (counts[v.name] || 0) + 1;
            });
            const names = Object.keys(counts).sort((a, b) => counts[b] - counts[a] || a.localeCompare(b, 'zh-CN'));
            const boxTotal = names.reduce((sum, name) => sum + counts[name], 0);
            const boxCollapsed = collapsedOverviewBoxes.has(boxId);

            let boxBody = '<div class="ov-box-body">';
            if (!names.length) {
              boxBody += '<div class="ov-empty">容器内暂无样本</div>';
            } else {
              boxBody += '<table class="ov-items"><thead><tr><th>样本名</th><th>数量</th></tr></thead><tbody>';
              names.forEach(name => { boxBody += `<tr><td>${name}</td><td>${counts[name]}</td></tr>`; });
              boxBody += '</tbody></table>';
            }
            boxBody += '</div>';

            folderBody += `
              <div class="ov-box">
                <div class="ov-box-head" onclick="toggleOverviewBox('${boxId}')">
                  <div><span class="ov-arrow">${boxCollapsed ? '▶' : '▼'}</span>${b.name} <span class="ov-meta">(${b.rows}x${b.cols})</span></div>
                  <div class="ov-meta">总计 ${boxTotal} 管</div>
                </div>
                ${boxCollapsed ? '' : boxBody}
              </div>
            `;
          });
        }

        folderBody += '</div>';
        chunks.push(`
          <div class="ov-folder" style="border-left:4px solid ${getFolderColor(fid)}">
            <div class="ov-folder-head" onclick="toggleOverviewFolder('${fid}')">
              <div><span class="ov-arrow">${folderCollapsed ? '▶' : '▼'}</span>${folder.name}</div>
              <div class="ov-meta">容器 ${boxes.length} | 样本 ${folderTotal}</div>
            </div>
            ${folderCollapsed ? '' : folderBody}
          </div>
        `);
      });

      tree.innerHTML = chunks.length ? chunks.join('') : '<div class="ov-empty">暂无数据</div>';
    }

    function exportExcel() {
      if (typeof XLSX === 'undefined') {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' }));
        a.download = `Cell_Storage_Export_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        return;
      }

      const wb = XLSX.utils.book_new();
      const boxIds = Object.keys(db.boxes);
      if (!boxIds.length) {
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([['暂无数据']]), '空数据');
        XLSX.writeFile(wb, `Cell_Storage_Export_${new Date().toISOString().slice(0,10)}.xlsx`);
        return;
      }

      boxIds.forEach((boxId, idx) => {
        const b = db.boxes[boxId];
        const folderName = db.folders[b.folderId]?.name || '未分类';
        const layout = getDisplayLayout(b);

        const aoa = [];
        aoa.push([`文件夹: ${folderName}`, `容器: ${b.name}`, `规格: ${b.rows}x${b.cols}`]);

        const header = ['行\列'];
        for (let c = 1; c <= layout.renderCols; c++) header.push(`C${c}`);
        aoa.push(header);

        for (let r = 1; r <= layout.renderRows; r++) {
          const row = [`R${r}`];
          for (let c = 1; c <= layout.renderCols; c++) {
            const pos = layout.toPos(r, c);
            const v = b.vials[pos];
            row.push(v?.name ? `${v.name}${v.p ? ` (${v.p})` : ''}` : '');
          }
          aoa.push(row);
        }

        const sheet = XLSX.utils.aoa_to_sheet(aoa);
        sheet['!cols'] = Array(layout.renderCols + 1).fill({ wch: 14 });
        const safeName = `${String(idx + 1).padStart(2, '0')}_${b.name}`.slice(0, 31);
        XLSX.utils.book_append_sheet(wb, sheet, safeName || `容器${idx + 1}`);
      });

      XLSX.writeFile(wb, `Cell_Storage_Export_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function exportJSON() {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], { type: 'application/json' }));
      a.download = `Cell_Storage_Backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }

    function triggerImport() { document.getElementById('import-file').click(); }

    function importJSON(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          const normalized = coerceBackupData(data);
          if (!normalized) return alert('文件格式错误，不是有效备份。');
          db = normalized;
          normalizeData();
          save();
          currentBoxId = null;
          selectedPositions.clear();
          renderFolderOptions();
          renderFolderList();
          renderBoxFolderStrip();
          renderBoxList();
          renderGrid();
          renderOverviewFolderStrip();
          updatePanel();
          updateWarningBoard();
          updateOverview();
          alert('导入成功！');
        } catch {
          alert('导入失败，文件可能已损坏。');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) document.getElementById('search-dd').style.display = 'none';
    });

    init();
  </script>
</body>
</html>

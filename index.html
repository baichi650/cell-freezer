<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>细胞冻存管理系统 v1.2</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #1890ff;
      --danger: #ff4d4f;
      --warning: #faad14;
      --bg: #f5f7fa;
      --dark: #001529;
      --card: #fff;
      --muted: #8c8c8c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
    }
    .sidebar {
      width: 300px;
      background: var(--dark);
      color: #fff;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }
    .logo { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .section-title { font-size: 12px; opacity: .8; margin: 6px 0 2px; }
    .list { background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06); border-radius: 8px; padding: 8px; overflow: auto; }
    .folder-list { max-height: 200px; }
    .box-list { flex: 1; min-height: 180px; }
    .folder-strip {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 2px 0 8px;
      scrollbar-width: thin;
    }
    .folder-chip {
      flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      color: #d9d9d9;
      cursor: pointer;
      white-space: nowrap;
      background: rgba(255,255,255,.04);
    }
    .folder-chip.active { color: #fff; border-color: currentColor; box-shadow: 0 0 0 1px rgba(255,255,255,.25) inset; }
    .folder-chip.all.active { color: #69c0ff; }
    .box-group-title {
      font-size: 12px;
      margin: 8px 0 6px;
      padding: 5px 8px;
      border-radius: 6px;
      color: #fff;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }
    .item {
      padding: 8px 10px;
      border-radius: 6px;
      background: #112a45;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      border: 1px solid transparent;
      font-size: 13px;
      gap: 8px;
    }
    .item:hover { border-color: #6f6f6f; }
    .item.active { background: var(--primary); border-color: #69c0ff; }
    .item.folder-item, .item.box-item { border-left: 4px solid transparent; }
    .item-info { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .item-tag {
      font-size: 10px;
      opacity: .9;
      margin-left: 5px;
      display: inline-block;
      padding: 1px 6px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.24);
      background: rgba(255,255,255,.12);
    }
    .mini-btn {
      border: none;
      background: transparent;
      color: #bfbfbf;
      cursor: pointer;
      font-size: 12px;
      padding: 3px 5px;
      border-radius: 4px;
    }
    .mini-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
    .mini-btn.danger:hover { background: var(--danger); }
    .row { display: flex; gap: 8px; }
    .btn {
      border: 1px solid #d9d9d9;
      background: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn:hover { border-color: var(--primary); color: var(--primary); }
    .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn.primary:hover { filter: brightness(1.06); }
    .select-dark {
      width: 100%;
      border: 1px solid #1f3f63;
      border-radius: 6px;
      padding: 8px;
      background: #112a45;
      color: #fff;
      margin-bottom: 8px;
    }

    .main { flex: 1; display: flex; flex-direction: column; gap: 16px; padding: 16px; overflow: hidden; }
    .header { display: flex; gap: 10px; align-items: center; }
    .search-wrap { flex: 1; position: relative; }
    .search { width: 100%; padding: 12px; border: 1px solid #d9d9d9; border-radius: 8px; }
    .search:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(24,144,255,.2); }
    .search-dd {
      position: absolute;
      left: 0; right: 0; top: calc(100% + 6px);
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,.15);
      max-height: 360px;
      overflow: auto;
      display: none;
      z-index: 10;
    }
    .search-item {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
    }
    .search-item:hover { background: #f0f7ff; }
    .loc-tag { font-size: 11px; background: #f5f5f5; border-radius: 4px; color: #666; padding: 2px 6px; }

    .content { flex: 1; display: flex; gap: 16px; overflow: hidden; }
    .view, .card { background: var(--card); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .view { flex: 1; padding: 16px; display: flex; justify-content: center; align-items: flex-start; overflow: auto; }
    .grid { display: grid; gap: 6px; width: fit-content; margin: 0 auto; }
    .empty-tip { color: #999; margin-top: 40px; }

    .cell {
      width: 48px; height: 48px;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      font-size: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      cursor: pointer;
      transition: .2s;
    }
    .cell.occupied { border-color: transparent; font-weight: 600; color: #333; }
    .cell.occupied:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.12); cursor: grab; }
    .cell.occupied:active { cursor: grabbing; }
    .cell.selected { border: 2px solid var(--primary) !important; box-shadow: 0 0 0 3px rgba(24,144,255,.22); transform: scale(1.05); }
    .cell.drag-over { border: 2px dashed var(--primary); background: #e6f7ff !important; }
    .cell.highlight { animation: pulse 1s infinite alternate; border: 2px solid var(--warning) !important; }
    .cell-label {
      max-width: 44px;
      padding: 1px 4px;
      border-radius: 4px;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(0,0,0,.08);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 11px;
      line-height: 1.2;
      text-align: center;
    }
    .cell-sub {
      margin-top: 2px;
      max-width: 40px;
      padding: 0 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.6);
      font-size: 8px;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cell.empty .cell-label {
      background: #fafafa;
      border-color: #eee;
      font-size: 9px;
      color: #999;
    }
    @keyframes pulse { from { transform: scale(1);} to { transform: scale(1.12);} }

    .panel { width: 340px; display: flex; flex-direction: column; gap: 12px; overflow: auto; }
    .card { padding: 16px; }
    .card h3 { margin: 0 0 10px; }
    .input { width: 100%; padding: 9px; margin: 4px 0 12px; border: 1px solid #d9d9d9; border-radius: 6px; }
    .stats { border: 1px solid #91d5ff; background: #e6f7ff; border-radius: 8px; padding: 10px; margin-bottom: 12px; }
    .stats.low { border-color: #ffa39e; background: #fff1f0; color: var(--danger); }
    .muted { color: var(--muted); font-size: 12px; }
    .warn-list { max-height: 180px; overflow: auto; font-size: 13px; }

    .overview-wrap { display: none; height: 100%; }
    .overview-filter {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 6px 0 12px;
      margin-bottom: 6px;
      border-bottom: 1px solid #f0f0f0;
    }
    .overview-chip {
      flex: 0 0 auto;
      border: 1px solid #d9d9d9;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      white-space: nowrap;
    }
    .overview-chip.active {
      border-color: currentColor;
      box-shadow: 0 0 0 1px rgba(0,0,0,.04) inset;
      font-weight: 600;
    }
    .overview-scroll {
      max-height: calc(100vh - 230px);
      overflow: auto;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
    }
    .overview-table { width: 100%; border-collapse: collapse; }
    .overview-table th, .overview-table td { text-align: left; padding: 10px; border-bottom: 1px solid #f0f0f0; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">🧪 细胞冻存管理 v1.2</div>

    <div class="section-title">位置文件夹</div>
    <div id="folder-list" class="list folder-list"></div>
    <div class="row">
      <button class="btn" onclick="addFolder()" style="flex:1">+ 新增文件夹</button>
    </div>

    <div class="section-title">容器列表</div>
    <div id="box-folder-strip" class="folder-strip"></div>
    <div id="box-list" class="list box-list"></div>

    <div style="border-top:1px solid rgba(255,255,255,.12);padding-top:10px;">
      <select id="new-box-folder" class="select-dark"></select>
      <select id="new-box-specs" class="select-dark">
        <option value="8,12" selected>规格: 96孔板 (8x12)</option>
        <option value="9,9">规格: 9x9 (81格)</option>
        <option value="10,10">规格: 10x10 (100格)</option>
      </select>
      <button class="btn primary" style="width:100%" onclick="addBox()">+ 新增容器</button>
    </div>
  </aside>

  <main class="main">
    <div class="header">
      <div class="search-wrap">
        <input id="global-search" class="search" type="text" placeholder="🔍 全局搜索：细胞名称 / 代数" oninput="handleGlobalSearch()" />
        <div id="search-dd" class="search-dd"></div>
      </div>
      <div class="row" style="flex-wrap:wrap;">
        <button class="btn" onclick="switchView('grid')">🧱 容器页面</button>
        <button class="btn" onclick="switchView('overview')">📊 总览页面</button>
        <button class="btn" onclick="exportExcel()">📗 导出Excel</button>
        <button class="btn" onclick="exportJSON()">📤 导出备份</button>
        <button class="btn" onclick="triggerImport()">📥 导入数据</button>
        <input id="import-file" type="file" style="display:none" onchange="importJSON(event)" />
      </div>
    </div>

    <section id="grid-view" class="content">
      <div class="view">
        <div id="empty-tip" class="empty-tip">请在左侧选择或新增一个容器</div>
        <div id="grid" class="grid"></div>
      </div>

      <div class="panel">
        <div class="card">
          <h3>📝 样本管理</h3>
          <div id="stats" class="stats">
            <div style="font-size:12px;">选定位置: <b id="sel-count">0</b></div>
            <div style="margin-top:6px;">全库总余量: <span id="total-inv" style="font-size:22px;font-weight:700">0</span> 管</div>
          </div>
          <label>细胞名称 (Name)</label>
          <input id="cell-name" class="input" type="text" placeholder="例如: HEK293T" oninput="updateLiveStats()" />
          <label>代数 (P)</label>
          <input id="cell-p" class="input" type="text" />
          <label>冻存日期</label>
          <input id="cell-date" class="input" type="date" />
          <button class="btn primary" style="width:100%" onclick="saveBatch()">保存并取消选择</button>
          <button class="btn" style="width:100%;margin-top:8px" onclick="clearBatch()">清空所选位置 (出库)</button>
        </div>

        <div class="card">
          <h3 style="color:var(--danger)">⚠️ 低库存预警</h3>
          <div id="warn-list" class="warn-list"></div>
        </div>
      </div>
    </section>

    <section id="overview-view" class="overview-wrap card">
      <h3>📊 文件夹库存总览</h3>
      <div id="overview-folder-strip" class="overview-filter"></div>
      <div class="overview-scroll">
        <table class="overview-table">
          <thead>
            <tr><th>文件夹</th><th>物品名称</th><th>数量</th></tr>
          </thead>
          <tbody id="overview-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'cell_storage_v1_2_db';

    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { folders: {}, boxes: {} };
    let currentBoxId = null;
    let currentFolderId = 'all';
    let selectedPositions = new Set();
    let searchHighlightPos = null;
    let draggedItemPos = null;
    let currentOverviewFolderId = 'all';

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

    function normalizeData() {
      let changed = false;
      if (!db.folders || typeof db.folders !== 'object') { db.folders = {}; changed = true; }
      if (!db.boxes || typeof db.boxes !== 'object') { db.boxes = {}; changed = true; }
      if (!Object.keys(db.folders).length) { db.folders.default = { name: '默认位置' }; changed = true; }

      Object.values(db.boxes).forEach(box => {
        if (box.size && !box.rows) { box.rows = box.size; box.cols = box.size; changed = true; }
        if (!box.rows) { box.rows = 8; changed = true; }
        if (!box.cols) { box.cols = 12; changed = true; }
        if (!box.vials) { box.vials = {}; changed = true; }
        if (!box.folderId || !db.folders[box.folderId]) { box.folderId = 'default'; changed = true; }
      });

      if (changed) save();
    }

    function init() {
      normalizeData();
      renderFolderOptions();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      updateWarningBoard();
      renderOverviewFolderStrip();
      updateOverview();
      if (!Object.keys(db.boxes).length) document.getElementById('empty-tip').style.display = 'block';
    }

    function getFolderColor(folderId) {
      const palette = ['#1677ff', '#13c2c2', '#722ed1', '#eb2f96', '#fa8c16', '#52c41a', '#2f54eb', '#f5222d'];
      if (!folderId || folderId === 'all') return '#69c0ff';
      let hash = 0;
      for (let i = 0; i < folderId.length; i++) hash = folderId.charCodeAt(i) + ((hash << 5) - hash);
      return palette[Math.abs(hash) % palette.length];
    }

    function setFolderFilter(folderId) {
      currentFolderId = folderId;
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
    }

    function setOverviewFolderFilter(folderId) {
      currentOverviewFolderId = folderId;
      renderOverviewFolderStrip();
      updateOverview();
    }

    function renderOverviewFolderStrip() {
      const strip = document.getElementById('overview-folder-strip');
      const folderIds = Object.keys(db.folders);
      strip.innerHTML = [
        `<div class="overview-chip ${currentOverviewFolderId === 'all' ? 'active' : ''}" onclick="setOverviewFolderFilter('all')">全部文件夹</div>`,
        ...folderIds.map(fid => `<div class="overview-chip ${currentOverviewFolderId === fid ? 'active' : ''}" style="color:${getFolderColor(fid)}" onclick="setOverviewFolderFilter('${fid}')">${db.folders[fid].name}</div>`)
      ].join('');
    }

    function addFolder() {
      const name = prompt('请输入位置文件夹名称：');
      if (!name) return;
      const id = 'folder_' + Date.now();
      db.folders[id] = { name: name.trim() };
      currentFolderId = id;
      save();
      renderFolderOptions();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function renameFolder(id, e) {
      e.stopPropagation();
      const next = prompt('请输入新的文件夹名称：', db.folders[id]?.name || '');
      if (!next) return;
      db.folders[id].name = next.trim();
      save();
      renderFolderOptions();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function deleteFolder(id, e) {
      e.stopPropagation();
      if (id === 'default') return alert('默认位置不可删除。');
      const related = Object.values(db.boxes).filter(b => b.folderId === id).length;
      if (related > 0) {
        const target = prompt(`该文件夹下有 ${related} 个容器。
请输入要迁移到的目标文件夹名称（留空取消）：`, db.folders.default?.name || '默认位置');
        if (!target) return;
        const targetId = Object.keys(db.folders).find(fid => db.folders[fid].name === target.trim());
        if (!targetId) return alert('未找到目标文件夹名称，请重试。');
        if (targetId === id) return alert('目标文件夹不能和待删除文件夹相同。');
        Object.values(db.boxes).forEach(box => {
          if (box.folderId === id) box.folderId = targetId;
        });
      }
      if (!confirm(`确定删除文件夹【${db.folders[id].name}】吗？`)) return;
      delete db.folders[id];
      if (currentFolderId === id) currentFolderId = 'all';
      save();
      renderFolderOptions();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function renderFolderOptions() {
      const sel = document.getElementById('new-box-folder');
      sel.innerHTML = Object.keys(db.folders).map(id => `<option value="${id}">位置: ${db.folders[id].name}</option>`).join('');
    }

    function renderFolderList() {
      const list = document.getElementById('folder-list');
      list.innerHTML = '';

      const totalBoxes = Object.keys(db.boxes).length;
      const allItem = document.createElement('div');
      allItem.className = `item ${currentFolderId === 'all' ? 'active' : ''}`;
      allItem.innerHTML = `<div class="item-info">全部文件夹</div><div class="item-tag">${totalBoxes}</div>`;
      allItem.onclick = () => setFolderFilter('all');
      list.appendChild(allItem);

      Object.keys(db.folders).forEach(id => {
        const folder = db.folders[id];
        const count = Object.values(db.boxes).filter(b => b.folderId === id).length;
        const div = document.createElement('div');
        div.className = `item folder-item ${currentFolderId === id ? 'active' : ''}`;
        div.style.borderLeftColor = getFolderColor(id);
        div.innerHTML = `
          <div class="item-info">${folder.name}<span class="item-tag">${count}</span></div>
          <div>
            <button class="mini-btn" title="重命名" onclick="renameFolder('${id}',event)">✎</button>
            <button class="mini-btn danger" title="删除" onclick="deleteFolder('${id}',event)">🗑</button>
          </div>
        `;
        div.onclick = () => setFolderFilter(id);
        list.appendChild(div);
      });
    }

    function renderBoxFolderStrip() {
      const strip = document.getElementById('box-folder-strip');
      const folderIds = Object.keys(db.folders);
      strip.innerHTML = [
        `<div class="folder-chip all ${currentFolderId === 'all' ? 'active' : ''}" onclick="setFolderFilter('all')">全部</div>`,
        ...folderIds.map(fid => `<div class="folder-chip ${currentFolderId === fid ? 'active' : ''}" style="color:${getFolderColor(fid)}" onclick="setFolderFilter('${fid}')">${db.folders[fid].name}</div>`)
      ].join('');
    }

    function addBox() {
      const name = prompt('请输入容器名称（例如：96孔板-1）：');
      if (!name) return;
      const [rows, cols] = document.getElementById('new-box-specs').value.split(',').map(Number);
      const folderId = document.getElementById('new-box-folder').value;
      const id = 'box_' + Date.now();
      db.boxes[id] = { name: name.trim(), rows, cols, folderId, vials: {} };
      save();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      switchBox(id);
      renderOverviewFolderStrip();
      updateOverview();
    }

    function moveBoxFolder(id, e) {
      e.stopPropagation();
      const box = db.boxes[id];
      if (!box) return;
      const options = Object.keys(db.folders)
        .map((fid, idx) => `${idx + 1}. ${db.folders[fid].name}${fid === box.folderId ? '（当前）' : ''}`)
        .join('\n');
      const input = prompt(`请选择目标文件夹序号：
${options}`);
      if (!input) return;
      const n = Number(input);
      const folderIds = Object.keys(db.folders);
      if (!Number.isInteger(n) || n < 1 || n > folderIds.length) return alert('输入序号无效。');
      const targetId = folderIds[n - 1];
      if (targetId === box.folderId) return;
      box.folderId = targetId;
      save();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function deleteBox(id, e) {
      e.stopPropagation();
      if (!confirm(`确定删除容器【${db.boxes[id].name}】及其内所有样本吗？`)) return;
      delete db.boxes[id];
      if (currentBoxId === id) {
        currentBoxId = null;
        document.getElementById('grid').innerHTML = '';
        document.getElementById('empty-tip').style.display = 'block';
      }
      selectedPositions.clear();
      save();
      renderFolderList();
      renderBoxFolderStrip();
      renderBoxList();
      updatePanel();
      updateWarningBoard();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function renderBoxList() {
      const list = document.getElementById('box-list');
      list.innerHTML = '';
      const ids = Object.keys(db.boxes);

      const renderBoxItem = (id) => {
        const b = db.boxes[id];
        const folderName = db.folders[b.folderId]?.name || '未分类';
        const div = document.createElement('div');
        div.className = `item box-item ${id === currentBoxId ? 'active' : ''}`;
        div.style.borderLeftColor = getFolderColor(b.folderId);
        div.innerHTML = `
          <div class="item-info">${b.name}<span class="item-tag">${b.rows}x${b.cols}</span>${currentFolderId === 'all' ? `<span class="item-tag">@${folderName}</span>` : ''}</div>
          <div>
            <button class="mini-btn" title="移动到其他文件夹" onclick="moveBoxFolder('${id}',event)">📁</button>
            <button class="mini-btn danger" title="删除容器" onclick="deleteBox('${id}',event)">✕</button>
          </div>
        `;
        div.onclick = () => { searchHighlightPos = null; switchBox(id); };
        list.appendChild(div);
      };

      if (currentFolderId !== 'all') {
        ids.filter(id => db.boxes[id].folderId === currentFolderId).forEach(renderBoxItem);
        return;
      }

      const grouped = {};
      ids.forEach(id => {
        const fid = db.boxes[id].folderId || 'default';
        if (!grouped[fid]) grouped[fid] = [];
        grouped[fid].push(id);
      });

      Object.keys(db.folders).forEach(fid => {
        const folderIds = grouped[fid] || [];
        if (!folderIds.length) return;
        const title = document.createElement('div');
        title.className = 'box-group-title';
        title.style.background = getFolderColor(fid);
        title.innerHTML = `<span>${db.folders[fid].name}</span><span>${folderIds.length}</span>`;
        list.appendChild(title);
        folderIds.forEach(renderBoxItem);
      });
    }

    function switchBox(id) {
      currentBoxId = id;
      selectedPositions.clear();
      document.getElementById('empty-tip').style.display = 'none';
      renderGrid();
      renderBoxList();
      updatePanel();
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      if (!currentBoxId || !db.boxes[currentBoxId]) return;

      const box = db.boxes[currentBoxId];
      grid.style.gridTemplateColumns = `repeat(${box.cols}, 48px)`;

      for (let r = 1; r <= box.rows; r++) {
        for (let c = 1; c <= box.cols; c++) {
          const pos = `${r}-${c}`;
          const vial = box.vials[pos];
          const el = document.createElement('div');
          el.className = 'cell';
          el.id = `cell-${pos}`;

          if (vial && vial.name) {
            el.classList.add('occupied');
            el.style.backgroundColor = stringToHslColor(vial.name);
            el.title = `位置: ${pos}\n名称: ${vial.name}\n代数: ${vial.p || '-'}\n日期: ${vial.date || '-'}`;
            el.innerHTML = `<div class="cell-label">${vial.name}</div><div class="cell-sub">${vial.p || 'P-'}</div>`;
            el.setAttribute('draggable', 'true');
            el.addEventListener('dragstart', (e) => handleDragStart(e, pos));
            el.addEventListener('dragend', handleDragEnd);
          } else {
            el.classList.add('empty');
            el.innerHTML = `<div class="cell-label">${pos}</div>`;
            el.addEventListener('dragover', handleDragOver);
            el.addEventListener('dragenter', function(){ this.classList.add('drag-over'); });
            el.addEventListener('dragleave', function(){ this.classList.remove('drag-over'); });
            el.addEventListener('drop', (e) => handleDrop(e, pos));
          }

          if (selectedPositions.has(pos)) el.classList.add('selected');
          if (searchHighlightPos === pos) el.classList.add('highlight');
          el.addEventListener('click', () => { searchHighlightPos = null; toggleSelect(pos); });
          grid.appendChild(el);
        }
      }
    }

    function stringToHslColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return `hsl(${Math.abs(hash) % 360}, 60%, 88%)`;
    }

    function handleDragStart(e, pos) {
      draggedItemPos = pos;
      e.dataTransfer.effectAllowed = 'move';
      e.target.style.opacity = '.5';
    }
    function handleDragEnd(e) {
      e.target.style.opacity = '1';
      document.querySelectorAll('.cell').forEach(el => el.classList.remove('drag-over'));
    }
    function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function handleDrop(e, targetPos) {
      e.stopPropagation();
      const box = db.boxes[currentBoxId];
      if (!box || !draggedItemPos || draggedItemPos === targetPos) return;
      if (box.vials[targetPos]) return alert('目标位置已有样本，请先清空目标位置。');
      box.vials[targetPos] = box.vials[draggedItemPos];
      delete box.vials[draggedItemPos];
      save();
      renderGrid();
      updateOverview();
    }

    function toggleSelect(pos) {
      if (selectedPositions.has(pos)) selectedPositions.delete(pos); else selectedPositions.add(pos);
      renderGrid();
      updatePanel();
    }

    function updatePanel() {
      document.getElementById('sel-count').textContent = selectedPositions.size;
      if (selectedPositions.size === 1 && currentBoxId) {
        const pos = [...selectedPositions][0];
        const data = db.boxes[currentBoxId].vials[pos] || {};
        document.getElementById('cell-name').value = data.name || '';
        document.getElementById('cell-p').value = data.p || '';
        document.getElementById('cell-date').value = data.date || '';
      }
      updateLiveStats();
    }

    function updateLiveStats() {
      const key = document.getElementById('cell-name').value.trim().toLowerCase();
      const total = document.getElementById('total-inv');
      const stats = document.getElementById('stats');
      if (!key) { total.textContent = '0'; stats.classList.remove('low'); return; }
      let cnt = 0;
      Object.values(db.boxes).forEach(b => Object.values(b.vials).forEach(v => {
        if (v.name && v.name.toLowerCase() === key) cnt++;
      }));
      total.textContent = cnt;
      if (cnt > 0 && cnt <= 3) stats.classList.add('low'); else stats.classList.remove('low');
    }

    function saveBatch() {
      if (!currentBoxId || !selectedPositions.size) return alert('请先选择格子。');
      const name = document.getElementById('cell-name').value.trim();
      if (!name) return alert('细胞名称必填。');

      const payload = {
        name,
        p: document.getElementById('cell-p').value.trim(),
        date: document.getElementById('cell-date').value
      };
      selectedPositions.forEach(pos => { db.boxes[currentBoxId].vials[pos] = { ...payload }; });
      selectedPositions.clear();
      save();
      renderGrid();
      updatePanel();
      updateWarningBoard();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function clearBatch() {
      if (!selectedPositions.size) return;
      if (!confirm('确定清空所选位置吗？')) return;
      selectedPositions.forEach(pos => delete db.boxes[currentBoxId].vials[pos]);
      selectedPositions.clear();
      save();
      renderGrid();
      updatePanel();
      updateWarningBoard();
      renderOverviewFolderStrip();
      updateOverview();
    }

    function handleGlobalSearch() {
      const term = document.getElementById('global-search').value.trim().toLowerCase();
      const dd = document.getElementById('search-dd');
      if (!term) { dd.style.display = 'none'; return; }

      const rows = [];
      Object.keys(db.boxes).forEach(boxId => {
        const box = db.boxes[boxId];
        Object.keys(box.vials).forEach(pos => {
          const v = box.vials[pos];
          const n = (v.name || '').toLowerCase();
          const p = (v.p || '').toLowerCase();
          if (n.includes(term) || p.includes(term)) {
            rows.push({ boxId, pos, name: v.name || '-', p: v.p || '-', boxName: box.name, folderName: db.folders[box.folderId]?.name || '-' });
          }
        });
      });

      dd.innerHTML = rows.length
        ? rows.map(r => `
          <div class="search-item" onclick="jumpTo('${r.boxId}','${r.pos}')">
            <div><b>${r.name}</b> <span class="muted">(${r.p})</span></div>
            <div class="loc-tag">${r.folderName}/${r.boxName} [${r.pos}]</div>
          </div>
        `).join('')
        : '<div style="padding:12px;color:#999">未找到匹配样本</div>';
      dd.style.display = 'block';
    }

    function jumpTo(boxId, pos) {
      document.getElementById('search-dd').style.display = 'none';
      document.getElementById('global-search').value = '';
      currentFolderId = db.boxes[boxId].folderId || 'all';
      renderFolderList();
      renderBoxFolderStrip();
      searchHighlightPos = pos;
      switchBox(boxId);
      setTimeout(() => {
        const el = document.getElementById(`cell-${pos}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 150);
    }

    function updateWarningBoard() {
      const w = document.getElementById('warn-list');
      const counts = {};
      Object.values(db.boxes).forEach(b => Object.values(b.vials).forEach(v => {
        if (v.name) counts[v.name] = (counts[v.name] || 0) + 1;
      }));
      const lows = Object.keys(counts).filter(name => counts[name] <= 3);
      w.innerHTML = lows.length
        ? lows.map(name => `<div style="padding:8px;display:flex;justify-content:space-between;border-bottom:1px solid #f0f0f0"><span>${name}</span><b style="color:var(--danger)">余${counts[name]}</b></div>`).join('')
        : '<div style="color:#bfbfbf;text-align:center;">✅ 库存充足</div>';
    }

    function switchView(view) {
      document.getElementById('grid-view').style.display = view === 'grid' ? 'flex' : 'none';
      document.getElementById('overview-view').style.display = view === 'overview' ? 'block' : 'none';
      if (view === 'overview') { renderOverviewFolderStrip(); updateOverview(); }
    }

    function updateOverview() {
      const body = document.getElementById('overview-body');
      const rows = [];
      const folderIds = currentOverviewFolderId === 'all' ? Object.keys(db.folders) : [currentOverviewFolderId].filter(fid => db.folders[fid]);

      folderIds.forEach(fid => {
        const folderName = db.folders[fid].name;
        const boxes = Object.values(db.boxes).filter(b => b.folderId === fid);
        const counts = {};
        boxes.forEach(b => {
          Object.values(b.vials).forEach(v => {
            if (!v.name) return;
            counts[v.name] = (counts[v.name] || 0) + 1;
          });
        });

        const names = Object.keys(counts).sort((a, b) => counts[b] - counts[a] || a.localeCompare(b, 'zh-CN'));
        if (!names.length) {
          rows.push(`<tr><td>${folderName}</td><td>（无样本）</td><td>0</td></tr>`);
          return;
        }

        names.forEach((name, idx) => {
          rows.push(`<tr><td>${idx === 0 ? folderName : ''}</td><td>${name}</td><td>${counts[name]}</td></tr>`);
        });
      });

      body.innerHTML = rows.length ? rows.join('') : '<tr><td colspan="3">暂无数据</td></tr>';
    }

    function exportExcel() {
      const details = [];
      Object.values(db.boxes).forEach(b => {
        const folderName = db.folders[b.folderId]?.name || '未分类';
        const positions = Object.keys(b.vials);
        if (!positions.length) {
          details.push({ 文件夹: folderName, 容器: b.name, 规格: `${b.rows}x${b.cols}`, 位置: '', 细胞名称: '', 代数: '', 冻存日期: '' });
          return;
        }
        positions.forEach(pos => {
          const v = b.vials[pos] || {};
          details.push({ 文件夹: folderName, 容器: b.name, 规格: `${b.rows}x${b.cols}`, 位置: pos, 细胞名称: v.name || '', 代数: v.p || '', 冻存日期: v.date || '' });
        });
      });

      const summary = [];
      Object.keys(db.folders).forEach(fid => {
        const folderName = db.folders[fid].name;
        const boxes = Object.values(db.boxes).filter(b => b.folderId === fid);
        const counts = {};
        boxes.forEach(b => {
          Object.values(b.vials).forEach(v => {
            if (!v.name) return;
            counts[v.name] = (counts[v.name] || 0) + 1;
          });
        });
        const names = Object.keys(counts);
        if (!names.length) {
          summary.push({ 文件夹: folderName, 物品名称: '（无样本）', 数量: 0 });
          return;
        }
        names.sort((a, b) => counts[b] - counts[a] || a.localeCompare(b, 'zh-CN'));
        names.forEach(name => summary.push({ 文件夹: folderName, 物品名称: name, 数量: counts[name] }));
      });

      if (typeof XLSX !== 'undefined') {
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(details), '样本明细');
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), '文件夹总览');
        XLSX.writeFile(wb, `Cell_Storage_Export_${new Date().toISOString().slice(0,10)}.xlsx`);
      } else {
        const csv = [Object.keys(details[0] || {}).join(','), ...details.map(r => Object.values(r).map(v => `"${String(v).replaceAll('"', '""')}"`).join(','))].join('\n');
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        a.download = `Cell_Storage_Export_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
      }
    }

    function exportJSON() {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], { type: 'application/json' }));
      a.download = `Cell_Storage_Backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }

    function triggerImport() { document.getElementById('import-file').click(); }

    function importJSON(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.boxes) return alert('文件格式错误，不是有效备份。');
          db = data;
          normalizeData();
          save();
          currentBoxId = null;
          selectedPositions.clear();
          renderFolderOptions();
          renderFolderList();
          renderBoxFolderStrip();
          renderBoxList();
          renderGrid();
          renderOverviewFolderStrip();
          updatePanel();
          updateWarningBoard();
          updateOverview();
          alert('导入成功！');
        } catch {
          alert('导入失败，文件可能已损坏。');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) document.getElementById('search-dd').style.display = 'none';
    });

    init();
  </script>
</body>
</html>
